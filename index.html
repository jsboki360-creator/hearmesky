<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:Arial;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
filter:brightness(0.6);
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

#intro{
position:fixed;
width:100%;
height:100%;
background:black;
z-index:10;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.introBox{text-align:center;}

button{
display:block;
margin:12px auto;
padding:15px 30px;
border-radius:30px;
border:none;
font-size:18px;
width:220px;
}

.startBtn{background:red;color:white;}
.appBtn{background:white;color:black;}

#count{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:100px;
color:white;
z-index:5;
}
</style>
</head>

<body>

<div id="intro">
  <div class="introBox">
    <h1>HearMeSKY</h1>
    <button class="startBtn" onclick="start()">START</button>
    <button class="appBtn" onclick="goApp()">APP 가입</button>
  </div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="count"></div>

<script>

// ================= PARAM =================
const params = new URLSearchParams(location.search);
const text = (params.get("msg") || "WE LOVE YOU").replaceAll("_"," ");
const txtStyle = params.get("txtsty") || "standard";
const effStyle = params.get("effsty") || "none";

// ================= SETUP =================
const video = document.getElementById("video");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
}
resize();
onresize=resize;

// ================= TEXT =================
function textY(){ return canvas.height*0.32; }

function drawMultiline(ctx,text,x,y,maxWidth,lineHeight){
 let words=text.split(" "), line="", lines=[];
 for(let w of words){
   let test=line+w+" ";
   if(ctx.measureText(test).width>maxWidth){
     lines.push(line);
     line=w+" ";
   }else line=test;
 }
 lines.push(line);

 let startY=y-(lines.length*lineHeight)/2;

 lines.forEach((l,i)=>{
   ctx.fillText(l.trim(),x,startY+i*lineHeight);
 });
}

// ---------- STANDARD ----------
function drawStandard(){
 ctx.fillStyle="#ffffff";
 ctx.font="bold 42px Arial";
 ctx.textAlign="center";
 ctx.textBaseline="middle";
 drawMultiline(ctx,text,canvas.width/2,textY(),canvas.width*0.8,55);
}

// ================= DRONE =================
let droneParticles=[];
let droneStable=false;

function initDrone(){

 const off=document.createElement("canvas");
 const o=off.getContext("2d");

 off.width=canvas.width;
 off.height=canvas.height;

 let size=Math.min(canvas.width/6,canvas.height/4);

 o.fillStyle="white";
 o.font=`bold ${size}px Arial`;
 o.textAlign="center";
 o.textBaseline="middle";

 drawMultiline(o,text,canvas.width/2,textY(),canvas.width*0.8,size*1.1);

 const img=o.getImageData(0,0,off.width,off.height);

 droneParticles=[];

 // 🔥 성능 핵심 (간격 증가)
 for(let y=0;y<off.height;y+=10){
  for(let x=0;x<off.width;x+=10){
    let i=(y*off.width+x)*4;
    if(img.data[i+3]>128){
      droneParticles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        tx:x,
        ty:y
      });
    }
  }
 }
}

function drawDrone(){

 let allArrived=true;

 ctx.shadowBlur=2;
 ctx.shadowColor="#66ccff";

 droneParticles.forEach(p=>{

   if(!droneStable){
     p.x += (p.tx - p.x)*0.05;
     p.y += (p.ty - p.y)*0.05;

     if(Math.abs(p.x-p.tx)>0.5 || Math.abs(p.y-p.ty)>0.5){
       allArrived=false;
     }
   }

   ctx.beginPath();
   ctx.arc(p.x,p.y,1.6,0,Math.PI*2);
   ctx.fill();
 });

 if(allArrived) droneStable=true;

 ctx.globalAlpha=1;
}

// ================= CLOUD =================
let cloudPuffs=[];
let cloudFrame=0;

function initCloud(){

 const off=document.createElement("canvas");
 const o=off.getContext("2d");

 off.width=canvas.width;
 off.height=canvas.height;

 let size=Math.min(canvas.width/6,canvas.height/4);

 o.fillStyle="white";
 o.font=`bold ${size}px Arial`;
 o.textAlign="center";
 o.textBaseline="middle";

 drawMultiline(o,text,canvas.width/2,textY(),canvas.width*0.8,size*1.2);

 const img=o.getImageData(0,0,off.width,off.height);

 cloudPuffs=[];

 for(let y=0;y<off.height;y+=12){
  for(let x=0;x<off.width;x+=12){
    let i=(y*off.width+x)*4;
    if(img.data[i+3]>128){
      cloudPuffs.push({
        x,y,
        r:Math.random()*6+3,
        seed:Math.random()*1000
      });
    }
  }
 }
}

function drawCloud(){

 cloudFrame++;
 if(cloudFrame%2!==0) return;

 const t=Date.now()*0.001;

 ctx.fillStyle="rgba(255,255,255,0.5)";

 cloudPuffs.forEach(p=>{
   let x=p.x+Math.sin(t+p.seed)*0.5;
   let y=p.y+Math.cos(t+p.seed)*0.3;

   ctx.beginPath();
   ctx.arc(x,y,p.r,0,Math.PI*2);
   ctx.fill();
 });

 // 🔥 글자 보강
 ctx.fillStyle="rgba(255,255,255,0.25)";
 ctx.font="bold 40px Arial";
 ctx.textAlign="center";
 ctx.fillText(text, canvas.width/2, textY());
}

// ================= FIREWORK =================
let rockets=[],sparks=[];
let fireFrame=0;

function launchRocket(){
 rockets.push({
  x:Math.random()*canvas.width,
  y:canvas.height,
  vx:(Math.random()-0.5),
  vy:-(Math.random()*4+6),
  exploded:false
 });
}
setInterval(launchRocket,1200);

function explode(x,y){
 for(let i=0;i<45;i++){
   let a=Math.random()*Math.PI*2;
   let s=Math.random()*2+1;
   sparks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:60});
 }
}

function drawFireworks(){

 fireFrame++;
 if(fireFrame%2!==0) return;

 rockets.forEach(r=>{
   r.x+=r.vx;
   r.y+=r.vy;
   r.vy+=0.08;

   ctx.fillStyle="#fff";
   ctx.fillRect(r.x,r.y,2,6);

   if(r.vy>0 && !r.exploded){
     explode(r.x,r.y);
     r.exploded=true;
   }
 });

 sparks.forEach((s,i)=>{

   s.x+=s.vx;
   s.y+=s.vy;
   s.vy+=0.03;
   s.life--;

   ctx.globalAlpha=s.life/60;

   ctx.strokeStyle="#ff3b3b";
   ctx.lineWidth=1.3;

   ctx.beginPath();
   ctx.moveTo(s.x,s.y);
   ctx.lineTo(s.x - s.vx*2.5, s.y - s.vy*2.5);
   ctx.stroke();

   ctx.globalAlpha=1;

   if(s.life<=0) sparks.splice(i,1);
 });
}

// ================= AURORA =================
let auroraTime=0;

function drawAurora(){

 auroraTime+=0.02;

 ctx.save();

 ctx.globalAlpha=0.12;
 ctx.filter="blur(6px)";

 const topH=canvas.height*0.45;

 for(let i=0;i<6;i++){

   let x=i*canvas.width/6 + 40;

   let g=ctx.createLinearGradient(x,0,x,topH);

   g.addColorStop(0,"rgba(255,0,150,0.25)");
   g.addColorStop(0.5,"rgba(0,200,255,0.15)");
   g.addColorStop(1,"transparent");

   ctx.fillStyle=g;

   ctx.beginPath();

   for(let y=0;y<topH;y+=5){
     let wave=Math.sin(y*0.01+auroraTime+i)*25;
     ctx.lineTo(x+wave,y);
   }

   ctx.lineTo(x+80,topH);
   ctx.lineTo(x+80,0);
   ctx.closePath();
   ctx.fill();
 }

 ctx.restore();
}

// ================= START =================
async function start(){

 let stream=await navigator.mediaDevices.getUserMedia({
   video:{facingMode:"environment"}
 });

 video.srcObject=stream;
 await video.play();

 intro.style.display="none";

 await countdown();

 if(txtStyle==="drone") initDrone();
 if(txtStyle==="cloud") initCloud();

 draw();
}

function countdown(){
 return new Promise(res=>{
  let c=3;
  count.innerText=c;
  let t=setInterval(()=>{
   c--;
   if(c>0) count.innerText=c;
   else{count.innerText="";clearInterval(t);res();}
  },1000);
 });
}

// ================= DRAW =================
function draw(){

 ctx.globalCompositeOperation="destination-out";
 ctx.fillStyle="rgba(0,0,0,0.08)";
 ctx.fillRect(0,0,canvas.width,canvas.height);
 ctx.globalCompositeOperation="source-over";

 if(effStyle==="fireworks") drawFireworks();
 else if(effStyle==="aurora") drawAurora();

 if(txtStyle==="drone") drawDrone();
 else if(txtStyle==="cloud") drawCloud();
 else drawStandard();

 requestAnimationFrame(draw);
}

// ================= APP =================
function goApp(){
 location.href="https://play.google.com/store/apps/details?id=com.example.hearmesky";
}

</script>
</body>
</html>
