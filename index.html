<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
}

video,canvas{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
}

canvas{ z-index:1; }
video{ z-index:0; }

#intro{
position:fixed;
width:100%;
height:100%;
background:black;
z-index:10;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

button{
padding:15px 30px;
margin:10px;
border-radius:30px;
border:none;
font-size:18px;
}
</style>
</head>

<body>

<div id="intro">
  <div>
    <h1>HearMeSKY</h1>
    <button onclick="start()">START</button>
  </div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="c"></canvas>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
}
resize();
onresize=resize;

// ======================
// TEXT
// ======================
const text = new URLSearchParams(location.search).get("msg") || "LOVE";

let particles = [];
let textMask;

// 텍스트 마스크 생성
function buildText(){

 const off = document.createElement("canvas");
 const o = off.getContext("2d");

 off.width=canvas.width;
 off.height=canvas.height;

 let size = Math.min(canvas.width/6,canvas.height/4);

 o.fillStyle="white";
 o.font=`bold ${size}px Arial`;
 o.textAlign="center";
 o.textBaseline="middle";

 o.fillText(text.replaceAll("_"," "), canvas.width/2, canvas.height/2);

 const img = o.getImageData(0,0,off.width,off.height);
 textMask = img;

 particles=[];

 for(let y=0;y<off.height;y+=6){
  for(let x=0;x<off.width;x+=6){

    let i=(y*off.width+x)*4;

    if(img.data[i+3]>128){

      particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        tx:x,
        ty:y
      });

    }
  }
 }
}

// ======================
// FIREWORKS
// ======================
let rockets=[];
let sparks=[];
const colors=["#ff4040","#ffcc00","#00ccff","#66ff66","#ff66ff","#ffffff"];

function launchRocket(){
 rockets.push({
   x:Math.random()*canvas.width,
   y:canvas.height,
   vx:(Math.random()-0.5)*2,
   vy:-(Math.random()*6+8),
   life:60
 });
}

function explode(x,y){

 for(let i=0;i<120;i++){

  let a=Math.random()*Math.PI*2;
  let s=Math.random()*5+2;

  sparks.push({
    x,y,
    vx:Math.cos(a)*s,
    vy:Math.sin(a)*s,
    life:80,
    color:colors[Math.floor(Math.random()*colors.length)]
  });

 }
}

setInterval(launchRocket,600);

// ======================
// START
// ======================
async function start(){

 try{
  const stream = await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject=stream;
 }catch{}

 document.getElementById("intro").style.display="none";

 buildText();
 draw();
}

// ======================
// DRAW
// ======================
function draw(){

 // 잔상
 ctx.fillStyle="rgba(0,0,0,0.2)";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 // =================
 // 🔥 불꽃 (텍스트 영역 제외)
 // =================
 rockets.forEach((r,i)=>{

   r.x+=r.vx;
   r.y+=r.vy;
   r.vy+=0.15;

   ctx.fillStyle="#fff";
   ctx.fillRect(r.x,r.y,2,6);

   if(r.vy>0){
     explode(r.x,r.y);
     rockets.splice(i,1);
   }

 });

 sparks.forEach((s,i)=>{

   s.x+=s.vx;
   s.y+=s.vy;

   s.vy+=0.05;
   s.vx*=0.99;

   s.life--;

   // 🔥 텍스트 영역이면 skip (마스크 핵심)
   let ix = (Math.floor(s.y)*canvas.width + Math.floor(s.x))*4;

   if(textMask && textMask.data[ix+3]>128){
     return;
   }

   ctx.globalAlpha=s.life/80;
   ctx.fillStyle=s.color;

   ctx.beginPath();
   ctx.arc(s.x,s.y,2,0,Math.PI*2);
   ctx.fill();

   ctx.globalAlpha=1;

   if(s.life<=0){
     sparks.splice(i,1);
   }

 });

 // =================
 // ✨ 드론 텍스트 (움직이며 형성)
 // =================
 ctx.fillStyle="#ffffff";

 particles.forEach(p=>{

   p.x += (p.tx - p.x)*0.04;
   p.y += (p.ty - p.y)*0.04;

   ctx.fillRect(p.x,p.y,2,2);

 });

 requestAnimationFrame(draw);
}

</script>
</body>
</html>
