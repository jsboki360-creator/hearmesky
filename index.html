<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
html, body {
  margin:0;
  padding:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
}

/* 📷 카메라 */
video {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

/* ✨ 드론 */
canvas {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:1;
}

/* 🔥 인트로 */
#intro {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  z-index:50;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

.introBox {
  text-align:center;
}

.introBox h1 {
  font-size:42px;
  margin-bottom:10px;
}

.introBox p {
  opacity:0.7;
}

.introBox button {
  margin-top:25px;
  padding:15px 30px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background:red;
  color:white;
}

/* ⏱ 카운트다운 */
#countdown {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  font-size:120px;
  color:white;
  z-index:30;
  font-weight:bold;
}

/* 📥 메시지 */
#msgList {
  position:fixed;
  top:15px;
  right:10px;
  z-index:20;
  color:white;
  font-size:13px;
  background:rgba(0,0,0,0.5);
  padding:8px;
  border-radius:10px;
  max-width:160px;
}
</style>
</head>

<body>

<!-- 🔥 인트로 -->
<div id="intro">
  <div class="introBox">
    <h1>HearMeSKY</h1>
    <p>하늘을 확인하세요</p>
    <button onclick="enter()">START EXPERIENCE</button>
  </div>
</div>

<!-- 📷 카메라 -->
<video id="video" autoplay playsinline></video>

<!-- ✨ 드론 -->
<canvas id="c"></canvas>

<!-- ⏱ -->
<div id="countdown"></div>

<!-- 📥 -->
<div id="msgList"></div>

<script>

let started = false;
let particles = [];
let streamReady = false;

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

// =======================
// 📷 카메라
// =======================
async function requestCamera(){

    if(streamReady) return true;

    try{
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        });

        document.getElementById("video").srcObject = stream;
        streamReady = true;

        return true;

    }catch(e){
        alert("카메라 권한 필요");
        return false;
    }
}

// =======================
// 🚀 시작 흐름
// =======================
async function enter(){

    const ok = await requestCamera();
    if(!ok) return;

    // 인트로 제거
    document.getElementById("intro").style.display = "none";

    // 카운트다운
    await countdown();

    // 쇼 시작
    startShow();
}

// =======================
// ⏱ 카운트다운
// =======================
function countdown(){

    return new Promise(resolve => {

        const el = document.getElementById("countdown");
        let count = 3;

        el.innerText = count;

        const timer = setInterval(() => {

            count--;

            if(count > 0){
                el.innerText = count;
            }else{
                el.innerText = "";
                clearInterval(timer);
                resolve();
            }

        }, 1000);
    });
}

// =======================
// 🎉 쇼 시작
// =======================
function startShow(){

    initParticles(text);
    started = true;
    draw();
}

// =======================
// 💬 메시지
// =======================
const params = new URLSearchParams(location.search);
const text = params.get("msg") || "We Love Gina";

function saveMessage(msg){
    let list = JSON.parse(localStorage.getItem("msgs") || "[]");

    list.push({
        text: msg,
        time: Date.now(),
        ttl: 60000
    });

    localStorage.setItem("msgs", JSON.stringify(list));
}

function drawList(){

    const listDiv = document.getElementById("msgList");

    let list = JSON.parse(localStorage.getItem("msgs") || "[]");
    let now = Date.now();

    list = list.filter(m => now - m.time < m.ttl);
    localStorage.setItem("msgs", JSON.stringify(list));

    listDiv.innerHTML = "";

    list.forEach(m => {

        let remain = Math.floor((m.ttl - (now - m.time)) / 1000);

        const div = document.createElement("div");
        div.innerHTML = `${m.text} (${remain}s)`;

        div.onclick = () => {
            initParticles(m.text);
        };

        listDiv.appendChild(div);
    });
}

setInterval(drawList, 1000);

// =======================
// ✨ 텍스트 → 입자
// =======================
function initParticles(customText){

    const off = document.createElement("canvas");
    const offCtx = off.getContext("2d");

    off.width = canvas.width;
    off.height = canvas.height;

    offCtx.fillStyle = "white";

    let fontSize = Math.min(canvas.width / 7, canvas.height / 4);

    offCtx.font = `bold ${fontSize}px Arial`;
    offCtx.textAlign = "center";
    offCtx.textBaseline = "middle";

    offCtx.fillText(customText, canvas.width/2, canvas.height/2);

    const imgData = offCtx.getImageData(0,0,off.width,off.height);

    particles = [];

    for(let y=0;y<off.height;y+=6){
        for(let x=0;x<off.width;x+=6){

            let i = (y * off.width + x) * 4;

            if(imgData.data[i+3] > 128){
                particles.push({
                    x: Math.random()*canvas.width,
                    y: Math.random()*canvas.height,
                    tx: x,
                    ty: y
                });
            }
        }
    }
}

// =======================
// 🎬 애니메이션
// =======================
function draw(){

    if(!started) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="white";

    particles.forEach(p=>{

        p.x += (p.tx - p.x)*0.05;
        p.y += (p.ty - p.y)*0.05;

        ctx.beginPath();
        ctx.arc(p.x,p.y,2,0,Math.PI*2);
        ctx.fill();
    });

    requestAnimationFrame(draw);
}

// 초기 저장
saveMessage(text);

</script>

</body>
</html>
