<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:Arial;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
filter:brightness(0.6);
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

#intro{
position:fixed;
width:100%;
height:100%;
background:black;
z-index:10;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

button{
margin:10px;
padding:15px 30px;
border:none;
border-radius:30px;
font-size:18px;
}
.startBtn{background:red;color:white;}
</style>
</head>

<body>

<div id="intro">
  <div>
    <h1>HearMeSKY</h1>
    <button class="startBtn" onclick="start()">START</button>
  </div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="c"></canvas>

<script>

// ================= PARAM =================
const params = new URLSearchParams(location.search);
const text = (params.get("msg") || "WE LOVE YOU").replaceAll("_"," ");
const txtStyle = params.get("txtsty") || "cloud";
const effStyle = params.get("effsty") || "aurora";

// ================= SETUP =================
const video = document.getElementById("video");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
 canvas.width = innerWidth;
 canvas.height = innerHeight;
}
resize();
onresize = resize;

let streamRef;

// ================= TEXT =================
let cloudParticles = [];

function drawMultiline(ctx,text,x,y,maxWidth,lineHeight){
 let words=text.split(" "), line="", lines=[];
 for(let w of words){
   let test=line+w+" ";
   if(ctx.measureText(test).width>maxWidth){
     lines.push(line); line=w+" ";
   }else line=test;
 }
 lines.push(line);

 let startY=y-(lines.length*lineHeight)/2;

 lines.forEach((l,i)=>{
   ctx.fillText(l.trim(),x,startY+i*lineHeight);
 });
}

// 🔥 CLOUD (핵심 수정)
function initCloud(){

 const off=document.createElement("canvas");
 const o=off.getContext("2d");

 off.width=canvas.width;
 off.height=canvas.height;

 let size=Math.min(canvas.width/6,canvas.height/4);

 o.fillStyle="white";
 o.font=`bold ${size}px Arial`;
 o.textAlign="center";
 o.textBaseline="middle";

 drawMultiline(o,text,canvas.width/2,canvas.height/2,canvas.width*0.8,size*1.2);

 const img=o.getImageData(0,0,off.width,off.height);

 cloudParticles=[];

 for(let y=0;y<off.height;y+=4){
  for(let x=0;x<off.width;x+=4){

    let i=(y*off.width+x)*4;

    if(img.data[i+3]>128 && Math.random()<0.3){

      cloudParticles.push({
        x:x,
        y:y,
        r:Math.random()*5+2,        // 🔥 작게
        a:Math.random()*0.2+0.05    // 🔥 연하게
      });

    }
  }
 }
}

function drawCloud(){

 ctx.shadowBlur=15;
 ctx.shadowColor="white";

 cloudParticles.forEach(p=>{

   let drift = Math.sin(Date.now()*0.001 + p.y*0.01) * 3;

   ctx.globalAlpha = p.a;

   ctx.beginPath();
   ctx.arc(p.x+drift, p.y, p.r, 0, Math.PI*2);
   ctx.fillStyle="#fff";
   ctx.fill();

 });

 ctx.globalAlpha=1;
 ctx.shadowBlur=0;
}

// ================= AURORA =================
function drawAurora(){

 const t = Date.now()*0.0006;

 ctx.save();
 ctx.globalCompositeOperation="lighter";
 ctx.globalAlpha=0.4;
 ctx.filter="blur(8px)";

 const count=18;

 for(let i=0;i<count;i++){

   let baseX=(i/count)*canvas.width;
   let width=canvas.width/count*2;

   let hue=(t*150+i*15)%360;

   let g=ctx.createLinearGradient(baseX,0,baseX,canvas.height*0.8);

   g.addColorStop(0,`hsla(${hue},100%,65%,0.3)`);
   g.addColorStop(0.5,`hsla(${hue+40},100%,60%,0.2)`);
   g.addColorStop(1,"transparent");

   ctx.fillStyle=g;

   ctx.beginPath();

   for(let y=0;y<canvas.height*0.8;y+=4){

     let wave =
       Math.sin(y*0.008+t*2+i*0.3)*40 +
       Math.sin(y*0.015+t*1.3+i)*25;

     let x=baseX+wave;

     if(y===0) ctx.moveTo(x,y);
     else ctx.lineTo(x,y);
   }

   for(let y=canvas.height*0.8;y>=0;y-=4){

     let wave =
       Math.sin(y*0.008+t*2+i*0.3)*40 +
       Math.sin(y*0.015+t*1.3+i)*25;

     let x=baseX+wave+width;

     ctx.lineTo(x,y);
   }

   ctx.closePath();
   ctx.fill();
 }

 ctx.restore();
}

// ================= START =================
async function start(){

 streamRef = await navigator.mediaDevices.getUserMedia({
   video:{facingMode:"environment"}
 });

 video.srcObject = streamRef;
 await video.play();

 intro.style.display="none";

 if(txtStyle==="cloud") initCloud();

 draw();
}

// ================= DRAW =================
function draw(){

 ctx.globalCompositeOperation="destination-out";
 ctx.fillStyle="rgba(0,0,0,0.03)";
 ctx.fillRect(0,0,canvas.width,canvas.height);
 ctx.globalCompositeOperation="source-over";

 if(effStyle==="aurora") drawAurora();

 if(txtStyle==="cloud") drawCloud();

 requestAnimationFrame(draw);
}

</script>
</body>
</html>
