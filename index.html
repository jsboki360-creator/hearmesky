<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:Arial;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

#intro{
position:fixed;
width:100%;
height:100%;
background:black;
z-index:10;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.introBox{text-align:center;}

button{
display:block;
margin:10px auto;
padding:15px 30px;
border-radius:30px;
border:none;
font-size:18px;
width:220px;
}

.startBtn{background:red;color:white;}

#camBtn{
position:fixed;
bottom:20px;
right:20px;
z-index:20;
display:none;
}

#count{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:100px;
color:white;
z-index:5;
}
</style>
</head>

<body>

<div id="intro">
  <div class="introBox">
    <h1>HearMeSKY</h1>
    <button class="startBtn" onclick="start()">START</button>
  </div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="count"></div>

<button id="camBtn" onclick="switchCamera()">카메라 전환</button>

<script>

// ================= PARAM =================
const p = new URLSearchParams(location.search);
const text = (p.get("msg")||"WE LOVE GINA").replaceAll("_"," ");
const txtStyle = p.get("txtsty")||"drone";
const effStyle = p.get("effsty")||"fireworks";

const video = document.getElementById("video");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let stream = null;
let currentFacing = "environment";
let started = false;

// ================= RESIZE =================
function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
}
resize();
onresize=resize;

// ================= CAMERA =================
async function startCamera(){

 if(!stream){
   stream = await navigator.mediaDevices.getUserMedia({
     video:true,
     audio:false
   });
 }

 const devices = await navigator.mediaDevices.enumerateDevices();
 const cams = devices.filter(d=>d.kind==="videoinput");

 let device = cams.find(d =>
   currentFacing==="environment"
   ? d.label.toLowerCase().includes("back")
   : d.label.toLowerCase().includes("front")
 );

 if(!device) device = cams[0];

 const newStream = await navigator.mediaDevices.getUserMedia({
   video:{deviceId:{exact:device.deviceId}}
 });

 video.srcObject = newStream;
 await video.play();
}

async function switchCamera(){
 currentFacing = currentFacing==="environment" ? "user" : "environment";
 await startCamera();
}

// ================= COUNTDOWN =================
async function countdown(){
 const el = document.getElementById("count");

 for(let i=3;i>=1;i--){
   el.innerText=i;
   await new Promise(r=>setTimeout(r,700));
 }

 el.innerText="";
}

// ================= TEXT =================
function getFontSize(txt,maxW){
 let size=120;
 while(size>20){
   ctx.font="bold "+size+"px Arial";
   if(ctx.measureText(txt).width<maxW) break;
   size-=2;
 }
 return size;
}

function drawText(){
 let maxW=canvas.width*0.8;
 let size=getFontSize(text,maxW);

 ctx.font="bold "+size+"px Arial";
 ctx.fillStyle="#fff";
 ctx.textAlign="center";

 ctx.fillText(text,canvas.width/2,canvas.height*0.4);
}

// ================= DRONE =================
let drone=[];

function initDrone(){
 drone=[];
 const off=document.createElement("canvas");
 const o=off.getContext("2d");

 off.width=canvas.width;
 off.height=canvas.height;

 let size=getFontSize(text,canvas.width*0.8);

 o.fillStyle="#fff";
 o.font="bold "+size+"px Arial";
 o.textAlign="center";
 o.fillText(text,canvas.width/2,canvas.height*0.4);

 const img=o.getImageData(0,0,off.width,off.height);

 for(let y=0;y<off.height;y+=6){
  for(let x=0;x<off.width;x+=6){
   let i=(y*off.width+x)*4;
   if(img.data[i+3]>128){
     drone.push({x,y});
   }
  }
 }
}

function drawDrone(){
 ctx.fillStyle="#fff";
 drone.forEach(p=>{
   ctx.fillRect(p.x,p.y,2,2);
 });
}

// ================= FIREWORK =================
let fireworks=[];

function launchFirework(){
 let x=Math.random()*canvas.width;
 let targetY=canvas.height*0.3;

 fireworks.push({
   type:"rocket",
   x,
   y:canvas.height,
   vy:-8,
   targetY
 });
}

function explode(x,y){
 const colors=["#ff4040","#ffd700","#66ccff","#cc66ff","#fff"];
 const color=colors[Math.floor(Math.random()*colors.length)];

 for(let i=0;i<20;i++){
   let angle=Math.random()*Math.PI*2;
   let speed=2+Math.random()*3;

   fireworks.push({
     type:"spark",
     x,y,
     vx:Math.cos(angle)*speed,
     vy:Math.sin(angle)*speed,
     life:40,
     color
   });
 }
}

function drawFireworks(){

 let next=[];

 if(fireworks.length<50) launchFirework();

 fireworks.forEach(p=>{

  if(p.type==="rocket"){
   p.y+=p.vy;

   ctx.fillStyle="#fff";
   ctx.fillRect(p.x,p.y,3,6);

   if(p.y<=p.targetY){
     explode(p.x,p.y);
   }else next.push(p);

  }else{
   p.x+=p.vx;
   p.y+=p.vy;
   p.vy+=0.05;
   p.life--;

   ctx.globalAlpha=p.life/40;
   ctx.strokeStyle=p.color;
   ctx.beginPath();
   ctx.moveTo(p.x,p.y);
   ctx.lineTo(p.x-p.vx*2,p.y-p.vy*2);
   ctx.stroke();

   if(p.life>0) next.push(p);
  }

 });

 fireworks=next;
 ctx.globalAlpha=1;
}

// ================= START =================
async function start(){

 if(started) return;
 started=true;

 await startCamera();

 document.getElementById("intro").style.display="none";
 document.getElementById("camBtn").style.display="block";

 await countdown();

 if(txtStyle==="drone") initDrone();

 draw();
}

// ================= DRAW =================
function draw(){

 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(effStyle==="fireworks") drawFireworks();

 if(txtStyle==="drone") drawDrone();
 else drawText();

 requestAnimationFrame(draw);
}

</script>
</body>
</html>
