<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:Arial;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
filter:brightness(0.6);
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

/* 스타트 화면 유지 */
#intro{
position:fixed;
width:100%;
height:100%;
background:black;
z-index:10;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.introBox{text-align:center;}

button{
display:block;
margin:12px auto;
padding:15px 30px;
border-radius:30px;
border:none;
font-size:18px;
width:220px;
}

.startBtn{background:red;color:white;}
.appBtn{background:white;color:black;}

#count{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:100px;
color:white;
z-index:5;
}
</style>
</head>

<body>

<div id="intro">
  <div class="introBox">
    <h1>HearMeSKY</h1>
    <button class="startBtn" onclick="start()">START</button>
    <button class="appBtn">APP 가입</button>
  </div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="count"></div>

<script>

// ================= PARAM =================
const params = new URLSearchParams(location.search);
const text = (params.get("msg") || "WE LOVE YOU").replaceAll("_"," ");

// ================= SETUP =================
const video = document.getElementById("video");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
}
resize();
onresize=resize;

let streamRef;

// ================= TEXT (CLOUD) =================
let cloudParticles=[];

function drawMultiline(ctx,text,x,y,maxWidth,lineHeight){
 let words=text.split(" "), line="", lines=[];
 for(let w of words){
   let test=line+w+" ";
   if(ctx.measureText(test).width>maxWidth){
     lines.push(line); line=w+" ";
   }else line=test;
 }
 lines.push(line);

 let startY=y-(lines.length*lineHeight)/2;

 lines.forEach((l,i)=>{
   ctx.fillText(l.trim(),x,startY+i*lineHeight);
 });
}

function initCloud(){

 const off=document.createElement("canvas");
 const o=off.getContext("2d");

 off.width=canvas.width;
 off.height=canvas.height;

 let size=Math.min(canvas.width/6,canvas.height/4);

 o.fillStyle="white";
 o.font=`bold ${size}px Arial`;
 o.textAlign="center";
 o.textBaseline="middle";

 drawMultiline(o,text,canvas.width/2,canvas.height/2,canvas.width*0.8,size*1.2);

 const img=o.getImageData(0,0,off.width,off.height);

 cloudParticles=[];

 for(let y=0;y<off.height;y+=4){
  for(let x=0;x<off.width;x+=4){

    let i=(y*off.width+x)*4;

    if(img.data[i+3]>128 && Math.random()<0.6){

      cloudParticles.push({
        x:x,
        y:y,
        r:Math.random()*3.5 + 1.5,
        a:Math.random()*0.25 + 0.12
      });

    }
  }
 }
}

function drawCloud(){

 ctx.save();

 ctx.globalCompositeOperation = "lighter";
 ctx.shadowBlur = 18;
 ctx.shadowColor = "white";

 cloudParticles.forEach(p=>{

   let drift = Math.sin(Date.now()*0.001 + p.y)*2;

   ctx.globalAlpha = p.a;

   ctx.beginPath();
   ctx.arc(p.x + drift, p.y, p.r, 0, Math.PI*2);
   ctx.fillStyle = "#ffffff";
   ctx.fill();

 });

 ctx.restore();
}

// ================= AURORA (파랑 + 약하게) =================
function drawAurora(){

 const t = Date.now()*0.0005;

 ctx.save();

 ctx.globalCompositeOperation="source-over";
 ctx.globalAlpha = 0.12;
 ctx.filter="blur(6px)";

 const count=16;

 for(let i=0;i<count;i++){

   let baseX=(i/count)*canvas.width;
   let width=canvas.width/count*2;

   let hue=200 + Math.sin(t + i)*30;

   let g=ctx.createLinearGradient(baseX,0,baseX,canvas.height*0.7);

   g.addColorStop(0,`hsla(${hue},100%,70%,0.15)`);
   g.addColorStop(0.5,`hsla(${hue+20},100%,60%,0.1)`);
   g.addColorStop(1,"transparent");

   ctx.fillStyle=g;

   ctx.beginPath();

   for(let y=0;y<canvas.height*0.7;y+=4){

     let wave =
       Math.sin(y*0.01+t*2+i*0.3)*25 +
       Math.sin(y*0.02+t*1.2+i)*10;

     let x=baseX+wave;

     if(y===0) ctx.moveTo(x,y);
     else ctx.lineTo(x,y);
   }

   for(let y=canvas.height*0.7;y>=0;y-=4){

     let wave =
       Math.sin(y*0.01+t*2+i*0.3)*25 +
       Math.sin(y*0.02+t*1.2+i)*10;

     let x=baseX+wave+width;

     ctx.lineTo(x,y);
   }

   ctx.closePath();
   ctx.fill();
 }

 ctx.restore();
}

// ================= START =================
async function start(){

 streamRef = await navigator.mediaDevices.getUserMedia({
   video:{facingMode:"environment"}
 });

 video.srcObject = streamRef;
 await video.play();

 intro.style.display="none";

 await countdown();

 initCloud();
 draw();
}

function countdown(){
 return new Promise(res=>{
  let c=3;
  count.innerText=c;
  let t=setInterval(()=>{
   c--;
   if(c>0) count.innerText=c;
   else{count.innerText="";clearInterval(t);res();}
  },1000);
 });
}

// ================= DRAW =================
function draw(){

 ctx.globalCompositeOperation="destination-out";
 ctx.fillStyle="rgba(0,0,0,0.01)";
 ctx.fillRect(0,0,canvas.width,canvas.height);
 ctx.globalCompositeOperation="source-over";

 drawAurora();
 drawCloud();

 requestAnimationFrame(draw);
}

</script>
</body>
</html>
