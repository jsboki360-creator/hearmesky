<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
body {
  margin:0;
  overflow:hidden;
  background:black;
}

video {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:1;
}

button {
  position:fixed;
  top:20px;
  left:20px;
  z-index:10;
  padding:12px 18px;
  font-size:16px;
}
</style>

</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="c"></canvas>

<button onclick="startCamera()">카메라 켜기</button>

<script>

let started = false; // 🔥 핵심: 시작 제어

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const params = new URLSearchParams(location.search);
const text = params.get("msg") || "Gina";

let particles = [];

// =======================
// 📷 카메라 시작
// =======================
async function startCamera(){

    if(started) return;

    try{

        // 🔥 권한 요청 먼저
        await navigator.mediaDevices.getUserMedia({ video: true });

        const devices = await navigator.mediaDevices.enumerateDevices();
        const cams = devices.filter(d => d.kind === "videoinput");

        let cam = cams.find(d =>
            d.label.toLowerCase().includes("back") ||
            d.label.toLowerCase().includes("rear")
        );

        if(!cam) cam = cams[cams.length - 1];

        const stream = await navigator.mediaDevices.getUserMedia({
            video: { deviceId: { exact: cam.deviceId } }
        });

        document.getElementById("video").srcObject = stream;

        // 🔥 여기서 드론 시작
        initParticles();
        started = true;
        draw();

    }catch(e){
        alert("카메라 실행 실패");
        console.log(e);
    }
}


// =======================
// ✨ 텍스트 → 입자
// =======================
function initParticles(){

    const off = document.createElement("canvas");
    const offCtx = off.getContext("2d");

    off.width = canvas.width;
    off.height = canvas.height;

    offCtx.fillStyle = "white";
    offCtx.font = "bold 120px Arial";

    const metrics = offCtx.measureText(text);
    const tx = (canvas.width - metrics.width) / 2;
    const ty = canvas.height / 2;

    offCtx.fillText(text, tx, ty);

    const imgData = offCtx.getImageData(0,0,off.width,off.height);

    particles = [];

    for(let y=0;y<off.height;y+=6){
        for(let x=0;x<off.width;x+=6){

            let i = (y * off.width + x) * 4;

            if(imgData.data[i+3] > 128){
                particles.push({
                    x: Math.random()*canvas.width,
                    y: Math.random()*canvas.height,
                    tx: x,
                    ty: y
                });
            }
        }
    }
}


// =======================
// 🎬 애니메이션
// =======================
function draw(){

    if(!started) return; // 🔥 시작 전엔 그리지 않음

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="white";

    particles.forEach(p=>{

        p.x += (p.tx - p.x)*0.05;
        p.y += (p.ty - p.y)*0.05;

        ctx.beginPath();
        ctx.arc(p.x,p.y,2,0,Math.PI*2);
        ctx.fill();
    });

    requestAnimationFrame(draw);
}

</script>

</body>
</html>
