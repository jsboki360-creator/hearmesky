<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:Arial;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
filter:brightness(0.6);
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

/* START 화면 */
#intro{
position:fixed;
width:100%;
height:100%;
background:black;
z-index:10;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.introBox{text-align:center;}

button{
display:block;
margin:12px auto;
padding:15px 30px;
border-radius:30px;
border:none;
font-size:18px;
width:220px;
}

.startBtn{background:red;color:white;}
.appBtn{background:white;color:black;}

#count{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:100px;
color:white;
z-index:5;
}
</style>
</head>

<body>

<div id="intro">
  <div class="introBox">
    <h1>HearMeSKY</h1>
    <button class="startBtn" onclick="start()">START</button>
    <button class="appBtn" onclick="goApp()">APP 가입</button>
  </div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="count"></div>

<script>

// ================= PARAM =================
const params = new URLSearchParams(location.search);

const text = (params.get("msg") || "WE LOVE YOU").replaceAll("_"," ");
const txtStyle = params.get("txtsty") || "cloud";
const effStyle = params.get("effsty") || "aurora";

// ================= SETUP =================
const video = document.getElementById("video");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
}
resize();
onresize=resize;

let streamRef;

// ================= TEXT =================

function drawMultiline(ctx,text,x,y,maxWidth,lineHeight){
 let words=text.split(" "), line="", lines=[];
 for(let w of words){
   let test=line+w+" ";
   if(ctx.measureText(test).width>maxWidth){
     lines.push(line); line=w+" ";
   }else line=test;
 }
 lines.push(line);

 let startY=y-(lines.length*lineHeight)/2;

 lines.forEach((l,i)=>{
   ctx.fillText(l.trim(),x,startY+i*lineHeight);
 });
}

// ---------- CLOUD ----------
let cloudParticles=[];

function initCloud(){

 const off=document.createElement("canvas");
 const o=off.getContext("2d");

 off.width=canvas.width;
 off.height=canvas.height;

 let size=Math.min(canvas.width/6,canvas.height/4);

 o.fillStyle="white";
 o.font=`bold ${size}px Arial`;
 o.textAlign="center";
 o.textBaseline="middle";

 drawMultiline(o,text,canvas.width/2,canvas.height/2,canvas.width*0.8,size*1.2);

 const img=o.getImageData(0,0,off.width,off.height);

 cloudParticles=[];

 for(let y=0;y<off.height;y+=6){
  for(let x=0;x<off.width;x+=6){

    let i=(y*off.width+x)*4;

    if(img.data[i+3]>128 && Math.random()<0.3){

      cloudParticles.push({
        x:x,
        y:y,
        r:Math.random()*2+1,
        a:Math.random()*0.2+0.1
      });

    }
  }
 }
}

function drawCloud(){

 ctx.shadowBlur=6;
 ctx.shadowColor="white";

 cloudParticles.forEach(p=>{
   let drift=Math.sin(Date.now()*0.001+p.y)*2;

   ctx.globalAlpha=p.a;
   ctx.beginPath();
   ctx.arc(p.x+drift,p.y,p.r,0,Math.PI*2);
   ctx.fillStyle="#fff";
   ctx.fill();
 });

 ctx.globalAlpha=1;
 ctx.shadowBlur=0;
}

// ---------- DRONE ----------
let droneParticles=[];

function initDrone(){

 const off=document.createElement("canvas");
 const o=off.getContext("2d");

 off.width=canvas.width;
 off.height=canvas.height;

 let size=Math.min(canvas.width/6,canvas.height/4);

 o.fillStyle="white";
 o.font=`bold ${size}px Arial`;
 o.textAlign="center";
 o.textBaseline="middle";

 drawMultiline(o,text,canvas.width/2,canvas.height/2,canvas.width*0.8,size*1.2);

 const img=o.getImageData(0,0,off.width,off.height);

 droneParticles=[];

 for(let y=0;y<off.height;y+=6){
  for(let x=0;x<off.width;x+=6){

    let i=(y*off.width+x)*4;

    if(img.data[i+3]>128){

      droneParticles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        tx:x,
        ty:y
      });

    }
  }
 }
}

function drawDrone(){

 ctx.fillStyle="#ffffff";

 droneParticles.forEach(p=>{
   p.x += (p.tx - p.x)*0.05;
   p.y += (p.ty - p.y)*0.05;
   ctx.fillRect(p.x,p.y,2,2);
 });
}

// ================= AURORA =================
function drawAurora(){

 const t = Date.now()*0.0005;

 ctx.save();
 ctx.globalAlpha=0.18;
 ctx.filter="blur(4px)";

 const count=12;

 for(let i=0;i<count;i++){

   let baseX=(i/count)*canvas.width;
   let width=canvas.width/count*1.5;

   let hue=200 + Math.sin(t + i)*25;

   let g=ctx.createLinearGradient(baseX,0,baseX,canvas.height*0.6);

   g.addColorStop(0,`hsla(${hue},100%,70%,0.18)`);
   g.addColorStop(0.5,`hsla(${hue+20},100%,60%,0.12)`);
   g.addColorStop(1,"transparent");

   ctx.fillStyle=g;

   ctx.beginPath();

   for(let y=0;y<canvas.height*0.6;y+=5){

     let wave =
       Math.sin(y*0.01+t*2+i*0.3)*20 +
       Math.sin(y*0.02+t*1.2+i)*10;

     let x=baseX+wave;

     if(y===0) ctx.moveTo(x,y);
     else ctx.lineTo(x,y);
   }

   for(let y=canvas.height*0.6;y>=0;y-=5){

     let wave =
       Math.sin(y*0.01+t*2+i*0.3)*20 +
       Math.sin(y*0.02+t*1.2+i)*10;

     let x=baseX+wave+width;

     ctx.lineTo(x,y);
   }

   ctx.closePath();
   ctx.fill();
 }

 ctx.restore();
}

// ================= START =================
async function start(){

 streamRef = await navigator.mediaDevices.getUserMedia({
   video:{facingMode:"environment"}
 });

 video.srcObject = streamRef;
 await video.play();

 intro.style.display="none";

 await countdown();

 // 🔥 핵심 분기
 if(txtStyle==="cloud") initCloud();
 if(txtStyle==="drone") initDrone();

 draw();
}

function countdown(){
 return new Promise(res=>{
  let c=3;
  count.innerText=c;
  let t=setInterval(()=>{
   c--;
   if(c>0) count.innerText=c;
   else{count.innerText="";clearInterval(t);res();}
  },1000);
 });
}

// ================= DRAW =================
function draw(){

 ctx.globalCompositeOperation="destination-out";
 ctx.fillStyle="rgba(0,0,0,0.015)";
 ctx.fillRect(0,0,canvas.width,canvas.height);
 ctx.globalCompositeOperation="source-over";

 if(effStyle==="aurora") drawAurora();

 if(txtStyle==="cloud") drawCloud();
 if(txtStyle==="drone") drawDrone();

 requestAnimationFrame(draw);
}

// ================= APP =================
function goApp(){
 location.href="https://play.google.com/store/apps/details?id=com.example.hearmesky";
}

</script>
</body>
</html>
