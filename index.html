<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:Arial;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
filter:brightness(0.6) contrast(1.1);
pointer-events:none;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

#intro{
position:fixed;
width:100%;
height:100%;
background:black;
z-index:10;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.introBox{text-align:center;}

button{
display:block;
margin:12px auto;
padding:15px 30px;
border-radius:30px;
border:none;
font-size:18px;
width:220px;
}

.startBtn{background:red;color:white;}
.appBtn{background:white;color:black;}

#count{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
color:white;
z-index:5;
}
</style>
</head>

<body>

<div id="intro">
  <div class="introBox">
    <h1>HearMeSKY</h1>
    <button class="startBtn" onclick="start()">START</button>
    <button class="appBtn" onclick="goApp()">APP 가입</button>
  </div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="count"></div>

<script>

// PARAM
const params = new URLSearchParams(location.search);
const text = (params.get("msg") || "WE LOVE YOU").replaceAll("_"," ");
const txtStyle = params.get("txtsty") || "standard";
const effStyle = params.get("effsty") || "fireworks";

const video = document.getElementById("video");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
}
resize();
onresize=resize;

let streamRef=null;

// ================= TEXT =================
let particles=[], cloudParticles=[];

function drawMultiline(ctx,text,x,y,maxWidth,lineHeight){
 let words=text.split(" "), line="", lines=[];
 for(let w of words){
   let test=line+w+" ";
   if(ctx.measureText(test).width>maxWidth){
     lines.push(line); line=w+" ";
   }else line=test;
 }
 lines.push(line);
 let startY=y-(lines.length*lineHeight)/2;
 lines.forEach((l,i)=>{
   ctx.fillText(l.trim(),x,startY+i*lineHeight);
 });
}

// drone
function buildDroneText(){
 const off=document.createElement("canvas");
 const o=off.getContext("2d");
 off.width=canvas.width; off.height=canvas.height;

 let size=Math.min(canvas.width/7,canvas.height/4);
 o.fillStyle="white";
 o.font=`bold ${size}px Arial`;
 o.textAlign="center"; o.textBaseline="middle";

 drawMultiline(o,text,canvas.width/2,canvas.height/2,canvas.width*0.8,size*1.3);

 const img=o.getImageData(0,0,off.width,off.height);
 particles=[];

 for(let y=0;y<off.height;y+=6){
  for(let x=0;x<off.width;x+=6){
   let i=(y*off.width+x)*4;
   if(img.data[i+3]>128){
    particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,tx:x,ty:y});
   }
  }
 }
}

// cloud
function initCloud(){
 cloudParticles=[];
 const off=document.createElement("canvas");
 const o=off.getContext("2d");
 off.width=canvas.width; off.height=canvas.height;

 let size=Math.min(canvas.width/7,canvas.height/4);
 o.fillStyle="white";
 o.font=`bold ${size}px Arial`;
 o.textAlign="center"; o.textBaseline="middle";

 drawMultiline(o,text,canvas.width/2,canvas.height/2,canvas.width*0.8,size*1.3);

 const img=o.getImageData(0,0,off.width,off.height);

 for(let y=0;y<off.height;y+=4){
  for(let x=0;x<off.width;x+=4){
   let i=(y*off.width+x)*4;
   if(img.data[i+3]>128 && Math.random()<0.35){
    cloudParticles.push({
      x:x,y:y,
      r:Math.random()*14+6,
      a:Math.random()*0.6+0.2
    });
   }
  }
 }
}

// ================= FIREWORKS =================
let rockets=[], sparks=[];
const fireColors=["#00ccff","#3399ff","#66ffff","#ffffff"];

function launchRocket(){
 rockets.push({
  x:Math.random()*canvas.width,
  y:canvas.height,
  vx:(Math.random()-0.5)*0.8,
  vy:-(Math.random()*4+6),
  exploded:false
 });
}
setInterval(launchRocket,1200);

function explode(x,y){
 let c=fireColors[Math.floor(Math.random()*fireColors.length)];
 for(let i=0;i<80;i++){
  let a=Math.random()*Math.PI*2;
  let s=Math.random()*2.5+1;
  sparks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:100,size:Math.random()*2+1,color:c});
 }
}

function drawFireworks(){
 rockets.forEach((r,i)=>{
  r.x+=r.vx; r.y+=r.vy; r.vy+=0.08;
  ctx.fillStyle="#fff"; ctx.fillRect(r.x,r.y,2,6);
  if(r.vy>0&&!r.exploded){explode(r.x,r.y);r.exploded=true;}
 });

 sparks.forEach((s,i)=>{
  s.x+=s.vx; s.y+=s.vy;
  s.vy+=0.03; s.vx*=0.98;
  s.life--;
  ctx.globalAlpha=s.life/100;
  ctx.fillStyle=s.color;
  ctx.beginPath();
  ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
  ctx.fill();
  ctx.globalAlpha=1;
  if(s.life<=0) sparks.splice(i,1);
 });
}

// ================= AURORA (아이폰급) =================
function drawAurora(){

 const t = Date.now()*0.0005;

 ctx.save();
 ctx.globalCompositeOperation="lighter";
 ctx.filter="blur(20px)";
 ctx.globalAlpha=0.7;

 const layers=10;

 for(let i=0;i<layers;i++){

   const baseX=(i/layers)*canvas.width;
   const width=canvas.width*0.3;
   const hue=(t*200+i*40)%360;

   const g=ctx.createLinearGradient(baseX,0,baseX,canvas.height*0.75);
   g.addColorStop(0,`hsla(${hue},100%,65%,0.45)`);
   g.addColorStop(0.3,`hsla(${hue+40},100%,60%,0.3)`);
   g.addColorStop(0.6,`hsla(${hue+80},100%,55%,0.2)`);
   g.addColorStop(1,"transparent");

   ctx.fillStyle=g;
   ctx.beginPath();

   for(let y=0;y<canvas.height*0.75;y+=3){
     let wave=Math.sin(y*0.01+t*2+i)*80+Math.sin(y*0.02+t*1.5+i*2)*40;
     let x=baseX+wave;
     if(y===0)ctx.moveTo(x,y);
     else ctx.lineTo(x,y);
   }

   for(let y=canvas.height*0.75;y>=0;y-=3){
     let wave=Math.sin(y*0.01+t*2+i)*80+Math.sin(y*0.02+t*1.5+i*2)*40;
     let x=baseX+wave+width;
     ctx.lineTo(x,y);
   }

   ctx.closePath();
   ctx.fill();
 }

 ctx.restore();
}

// ================= RAINBOW =================
function drawRainbow(){
 let t=Date.now()*0.002;
 for(let i=0;i<canvas.height;i+=4){
  let h=(i*0.5+t*100)%360;
  ctx.strokeStyle=`hsla(${h},100%,60%,0.12)`;
  ctx.beginPath();
  ctx.moveTo(0,i);
  ctx.lineTo(canvas.width,i+Math.sin(i*0.02+t)*20);
  ctx.stroke();
 }
}

// ================= START =================
async function start(){

 if(!streamRef){
  streamRef=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
  video.srcObject=streamRef;
  await video.play();
 }

 intro.style.display="none";
 await countdown();

 if(txtStyle==="drone") buildDroneText();
 if(txtStyle==="cloud") initCloud();

 draw();
}

function countdown(){
 return new Promise(res=>{
  let c=3;
  count.innerText=c;
  let t=setInterval(()=>{
   c--;
   if(c>0)count.innerText=c;
   else{count.innerText="";clearInterval(t);res();}
  },1000);
 });
}

// ================= DRAW =================
function draw(){

 ctx.globalCompositeOperation="destination-out";
 ctx.fillStyle="rgba(0,0,0,0.06)";
 ctx.fillRect(0,0,canvas.width,canvas.height);
 ctx.globalCompositeOperation="source-over";

 // EFFECT
 if(effStyle==="fireworks") drawFireworks();
 if(effStyle==="aurora") drawAurora();
 if(effStyle==="rainbow") drawRainbow();

 // TEXT
 if(txtStyle==="standard"){
  ctx.fillStyle="#fff";
  ctx.font="bold 48px Arial";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  drawMultiline(ctx,text,canvas.width/2,canvas.height/2,canvas.width*0.8,60);
 }

 if(txtStyle==="drone"){
  particles.forEach(p=>{
   p.x+=(p.tx-p.x)*0.02;
   p.y+=(p.ty-p.y)*0.02;
   ctx.fillRect(p.x,p.y,2,2);
  });
 }

 if(txtStyle==="cloud"){
  cloudParticles.forEach(p=>{
   let wave=Math.sin(Date.now()*0.001+p.y)*3;
   ctx.globalAlpha=p.a;
   ctx.beginPath();
   ctx.arc(p.x+wave,p.y,p.r,0,Math.PI*2);
   ctx.fillStyle="#fff";
   ctx.fill();
  });
  ctx.globalAlpha=1;
 }

 requestAnimationFrame(draw);
}

// =================
function goApp(){
 location.href="https://play.google.com/store/apps/details?id=com.example.hearmesky";
}

</script>
</body>
</html>
