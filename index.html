<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
font-family:Arial;
background:black;
}

/* 카메라 */
video{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
z-index:0;

/* 🔥 밤 느낌 */
filter:brightness(0.25) contrast(1.3);
}

/* 효과 레이어 */
.effect{
position:fixed;
width:100%;
height:100%;
z-index:1;
pointer-events:none;
}

/* 텍스트 */
#txt{
position:fixed;
top:40%;
width:100%;
text-align:center;
z-index:2;
color:white;
font-weight:bold;
}

/* cloud 효과 */
.cloud{
text-shadow:
0 0 10px white,
0 0 20px white,
0 0 30px white;
filter:blur(1px);
}

/* drone 효과 */
.drone{
letter-spacing:12px;
}

/* UI */
#intro{
position:fixed;
width:100%;
height:100%;
background:black;
z-index:10;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

button{
margin:10px;
padding:14px 30px;
border:none;
border-radius:30px;
font-size:18px;
}

.startBtn{background:red;color:white;}
.appBtn{background:white;color:black;}
</style>
</head>

<body>

<div id="intro">
  <button class="startBtn" onclick="start()">START</button>
  <button class="appBtn">APP</button>
</div>

<video id="video" autoplay playsinline muted></video>

<!-- 효과 -->
<canvas id="fx" class="effect"></canvas>

<div id="txt"></div>

<script>

const p=new URLSearchParams(location.search);

const text=(p.get("msg")||"WE LOVE GINA").replaceAll("_"," ");
const txtStyle=p.get("txtsty")||"standard";
const effStyle=p.get("effsty")||"none";

const video=document.getElementById("video");
const txt=document.getElementById("txt");
const canvas=document.getElementById("fx");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

// ================= TEXT =================
txt.innerText=text;

if(txtStyle==="standard"){
 txt.style.fontSize="60px";
}

if(txtStyle==="cloud"){
 txt.classList.add("cloud");
 txt.style.fontSize="70px";
}

if(txtStyle==="drone"){
 txt.classList.add("drone");
 txt.style.fontSize="60px";
}

// ================= EFFECT =================

// 🔥 FIREWORK (이미지 느낌)
function drawFireworks(){
 for(let i=0;i<5;i++){
   let x=Math.random()*canvas.width;
   let y=Math.random()*canvas.height*0.4;

   ctx.beginPath();
   ctx.arc(x,y,3,0,Math.PI*2);
   ctx.fillStyle="#ff5555";
   ctx.fill();

   for(let j=0;j<20;j++){
     let a=Math.random()*Math.PI*2;
     let r=Math.random()*50;
     ctx.fillRect(x+Math.cos(a)*r,y+Math.sin(a)*r,2,2);
   }
 }
}

// 🔥 AURORA (부드러운 밴드)
function drawAurora(){

 ctx.globalAlpha=0.2;

 for(let i=0;i<5;i++){

   let g=ctx.createLinearGradient(0,0,0,canvas.height*0.5);

   g.addColorStop(0,"rgba(0,255,200,0.3)");
   g.addColorStop(0.5,"rgba(150,0,255,0.2)");
   g.addColorStop(1,"transparent");

   ctx.fillStyle=g;

   ctx.fillRect(i*200,0,200,canvas.height*0.5);
 }

 ctx.globalAlpha=1;
}

// ================= START =================
async function start(){

 let s=await navigator.mediaDevices.getUserMedia({video:true});
 video.srcObject=s;
 await video.play();

 intro.style.display="none";

 if(effStyle==="fireworks") setInterval(drawFireworks,800);
 if(effStyle==="aurora") drawAurora();
}

</script>
</body>
</html>
