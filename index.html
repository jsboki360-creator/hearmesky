<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin:0;
  padding:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
}

/* 카메라 */
video {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

/* 드론 */
canvas {
  position:fixed;
  width:100%;
  height:100%;
  z-index:1;
}

/* 인트로 */
#intro {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  z-index:50;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.introBox {
  text-align:center;
}

.introBox h1 {
  font-size:42px;
}

.introBox button {
  margin-top:20px;
  padding:15px 30px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background:red;
  color:white;
}

/* 카운트다운 */
#countdown {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:120px;
  color:white;
  z-index:30;
}
</style>
</head>

<body>

<div id="intro">
  <div class="introBox">
    <h1>HearMeSKY</h1>
    <button onclick="enter()">START</button>
  </div>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="c"></canvas>
<div id="countdown"></div>

<script>

let particles = [];
let started = false;

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
onresize = resize;

// ======================
// 카메라
// ======================
async function requestCamera(){
    try{
        const stream = await navigator.mediaDevices.getUserMedia({
            video:{facingMode:"environment"}
        });
        video.srcObject = stream;
        return true;
    }catch{
        alert("카메라 필요");
        return false;
    }
}

// ======================
// 시작
// ======================
async function enter(){
    const ok = await requestCamera();
    if(!ok) return;

    intro.style.display = "none";

    await countdown();

    startShow();
}

// ======================
// 카운트
// ======================
function countdown(){
    return new Promise(res=>{
        let c = 3;
        countdown.innerText = c;

        const t = setInterval(()=>{
            c--;
            if(c>0){
                countdown.innerText = c;
            }else{
                countdown.innerText = "";
                clearInterval(t);
                res();
            }
        },1000);
    });
}

// ======================
// 메시지
// ======================
const params = new URLSearchParams(location.search);
let text = params.get("msg") || "WE LOVE YOU";

// 🔥 너무 길면 자르기
if(text.length > 50){
    text = text.substring(0,50) + "...";
}

// ======================
// 🔥 자동 줄바꿈
// ======================
function drawMultiline(ctx, text, x, y, maxWidth, lineHeight){

    const words = text.split("_"); // URL용 _
    let line = "";
    let lines = [];

    for(let i=0;i<words.length;i++){
        let test = line + words[i] + " ";
        let w = ctx.measureText(test).width;

        if(w > maxWidth && i>0){
            lines.push(line);
            line = words[i] + " ";
        }else{
            line = test;
        }
    }
    lines.push(line);

    // 🔥 최대 3줄 제한
    lines = lines.slice(0,3);

    let startY = y - (lines.length * lineHeight)/2;

    lines.forEach((l,i)=>{
        ctx.fillText(l.trim(), x, startY + i*lineHeight);
    });
}

// ======================
// 입자 생성
// ======================
function initParticles(txt){

    const off = document.createElement("canvas");
    const o = off.getContext("2d");

    off.width = canvas.width;
    off.height = canvas.height;

    let size = Math.min(canvas.width/8, canvas.height/5);

    o.fillStyle="white";
    o.font = `bold ${size}px Arial`;
    o.textAlign="center";
    o.textBaseline="middle";

    drawMultiline(
        o,
        txt,
        canvas.width/2,
        canvas.height/2,
        canvas.width*0.8,
        size*1.3
    );

    const img = o.getImageData(0,0,off.width,off.height);

    particles = [];

    for(let y=0;y<off.height;y+=6){
        for(let x=0;x<off.width;x+=6){

            let i = (y*off.width+x)*4;

            if(img.data[i+3] > 128){
                particles.push({
                    x: Math.random()*canvas.width,
                    y: Math.random()*canvas.height,
                    tx: x,
                    ty: y
                });
            }
        }
    }
}

// ======================
// 쇼 시작
// ======================
function startShow(){
    initParticles(text);
    started = true;
    draw();
}

// ======================
// 애니메이션
// ======================
function draw(){

    if(!started) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="white";

    particles.forEach(p=>{
        p.x += (p.tx - p.x)*0.05;
        p.y += (p.ty - p.y)*0.05;

        ctx.beginPath();
        ctx.arc(p.x,p.y,2,0,Math.PI*2);
        ctx.fill();
    });

    requestAnimationFrame(draw);
}

</script>
</body>
</html>
