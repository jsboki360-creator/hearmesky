<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
body {
  margin:0;
  overflow:hidden;
  background:black;
}

/* 📷 카메라 */
video {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

/* ✨ 드론 */
canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:1;
}

/* 🔘 버튼 공통 */
.btn {
  position:fixed;
  bottom:30px;
  z-index:10;
  padding:22px 32px;
  font-size:20px;
  border-radius:50px;
  border:none;
}

/* 📷 카메라 버튼 */
.camBtn {
  left:30%;
  transform:translateX(-50%);
  background:black;
  color:red;
}

/* 📱 앱 버튼 */
.appBtn {
  left:70%;
  transform:translateX(-50%);
  background:red;
  color:white;
}
</style>

</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="c"></canvas>

<!-- 🔘 버튼 -->
<button class="btn camBtn" onclick="startCamera()">📷 Camera</button>
<button class="btn appBtn" onclick="installApp()">📱 App</button>

<script>

let started = false;

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const params = new URLSearchParams(location.search);
const text = params.get("msg") || "Gina";

let particles = [];

// =======================
// 📷 카메라 시작
// =======================
async function startCamera(){

    if(started) return;

    try{

        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        });

        document.getElementById("video").srcObject = stream;

        initParticles();
        started = true;
        draw();

    }catch(e){
        console.log(e);
        alert("카메라 실행 실패");
    }
}

// =======================
// 📱 앱 설치
// =======================
function installApp(){

    // 👉 나중에 실제 앱 주소 넣기
    window.location.href =
    "https://play.google.com/store/apps/details?id=com.example.hearmesky";
}


// =======================
// ✨ 텍스트 → 입자
// =======================
function initParticles(){

    const off = document.createElement("canvas");
    const offCtx = off.getContext("2d");

    off.width = canvas.width;
    off.height = canvas.height;

    offCtx.fillStyle = "white";
    offCtx.font = "bold 120px Arial";

    const metrics = offCtx.measureText(text);
    const tx = (canvas.width - metrics.width) / 2;
    const ty = canvas.height / 2;

    offCtx.fillText(text, tx, ty);

    const imgData = offCtx.getImageData(0,0,off.width,off.height);

    particles = [];

    for(let y=0;y<off.height;y+=6){
        for(let x=0;x<off.width;x+=6){

            let i = (y * off.width + x) * 4;

            if(imgData.data[i+3] > 128){
                particles.push({
                    x: Math.random()*canvas.width,
                    y: Math.random()*canvas.height,
                    tx: x,
                    ty: y
                });
            }
        }
    }
}


// =======================
// 🎬 애니메이션
// =======================
function draw(){

    if(!started) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="white";

    particles.forEach(p=>{

        p.x += (p.tx - p.x)*0.05;
        p.y += (p.ty - p.y)*0.05;

        ctx.beginPath();
        ctx.arc(p.x,p.y,2,0,Math.PI*2);
        ctx.fill();
    });

    requestAnimationFrame(draw);
}

</script>

</body>
</html>
