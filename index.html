<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:Arial;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
filter:brightness(0.6);
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

#intro{
position:fixed;
width:100%;
height:100%;
background:black;
z-index:10;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.introBox{text-align:center;}

button{
display:block;
margin:12px auto;
padding:15px 30px;
border-radius:30px;
border:none;
font-size:18px;
width:220px;
}

.startBtn{background:red;color:white;}
.appBtn{background:white;color:black;}

#count{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:100px;
color:white;
z-index:5;
}
</style>
</head>

<body>

<div id="intro">
  <div class="introBox">
    <h1>HearMeSKY</h1>
    <button class="startBtn" onclick="start()">START</button>
    <button class="appBtn" onclick="goApp()">APP 가입</button>
  </div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="count"></div>

<script>

// ================= PARAM =================
const params = new URLSearchParams(location.search);

const text = (params.get("msg") || "WE LOVE YOU").replaceAll("_"," ");
const txtStyle = params.get("txtsty") || "standard";
const effStyle = params.get("effsty") || "fireworks";

// ================= SETUP =================
const video = document.getElementById("video");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
}
resize();
onresize=resize;

let streamRef;

// 메시지 위치: 중상단
function textY(){
 return canvas.height * 0.32;
}

// ================= TEXT =================
function drawMultiline(ctx,text,x,y,maxWidth,lineHeight){
 let words=text.split(" "), line="", lines=[];
 for(let w of words){
   let test=line+w+" ";
   if(ctx.measureText(test).width>maxWidth && line.length>0){
     lines.push(line);
     line=w+" ";
   }else{
     line=test;
   }
 }
 lines.push(line);

 let startY=y-(lines.length*lineHeight)/2;

 lines.forEach((l,i)=>{
   ctx.fillText(l.trim(),x,startY+i*lineHeight);
 });
}

// ---------- STANDARD ----------
function drawStandard(){
 ctx.save();

 ctx.fillStyle="#ffffff";
 ctx.font="bold 48px Arial";
 ctx.textAlign="center";
 ctx.textBaseline="middle";
 ctx.shadowBlur=8;
 ctx.shadowColor="rgba(255,255,255,0.8)";

 drawMultiline(ctx,text,canvas.width/2,textY(),canvas.width*0.8,60);

 ctx.restore();
}

// ---------- CLOUD ----------
let cloudPuffs = [];
let corePoints = [];

function initCloud(){

 cloudPuffs = [];
 corePoints = [];

 const off = document.createElement("canvas");
 const o = off.getContext("2d");

 off.width = canvas.width;
 off.height = canvas.height;

 let size = Math.min(canvas.width/6, canvas.height/4);

 o.fillStyle="white";
 o.font=`bold ${size}px Arial`;
 o.textAlign="center";
 o.textBaseline="middle";

 drawMultiline(o,text,
   canvas.width/2,
   textY(),
   canvas.width*0.8,
   size*1.2
 );

 const img = o.getImageData(0,0,off.width,off.height);

 for(let y=0;y<off.height;y+=7){
  for(let x=0;x<off.width;x+=7){

    let i=(y*off.width+x)*4;

    if(img.data[i+3] > 128){

      if(Math.random() < 0.2){
        corePoints.push({x:x, y:y});
      }

      cloudPuffs.push({
        tx:x,
        ty:y,
        r:Math.random()*6 + 4,
        alpha:Math.random()*0.4 + 0.5,
        seed:Math.random()*1000
      });
    }
  }
 }
}

function drawCloud(){

 ctx.save();

 const t = Date.now()*0.001;

 cloudPuffs.forEach(p=>{

   let offsetX = Math.sin(t + p.seed) * 0.6;
   let offsetY = Math.cos(t*0.7 + p.seed) * 0.4;

   let x = p.tx + offsetX;
   let y = p.ty + offsetY;

   let g = ctx.createRadialGradient(x, y, 0, x, y, p.r);

   g.addColorStop(0, `rgba(255,255,255,${p.alpha})`);
   g.addColorStop(0.7, "rgba(255,255,255,0.2)");
   g.addColorStop(1, "rgba(255,255,255,0)");

   ctx.fillStyle = g;
   ctx.beginPath();
   ctx.arc(x, y, p.r, 0, Math.PI*2);
   ctx.fill();

 });

 ctx.fillStyle = "rgba(255,255,255,0.9)";

 corePoints.forEach(p=>{
   ctx.beginPath();
   ctx.arc(p.x, p.y, 1.2, 0, Math.PI*2);
   ctx.fill();
 });

 ctx.restore();
}

// ---------- DRONE ----------
let droneParticles=[];

function initDrone(){

 const off=document.createElement("canvas");
 const o=off.getContext("2d");

 off.width=canvas.width;
 off.height=canvas.height;

 let size=Math.min(canvas.width/6,canvas.height/4);

 o.fillStyle="white";
 o.font=`bold ${size}px Arial`;
 o.textAlign="center";
 o.textBaseline="middle";

 drawMultiline(o,text,canvas.width/2,textY(),canvas.width*0.8,size*1.2);

 const img=o.getImageData(0,0,off.width,off.height);

 droneParticles=[];

 for(let y=0;y<off.height;y+=6){
  for(let x=0;x<off.width;x+=6){
    let i=(y*off.width+x)*4;
    if(img.data[i+3]>128){
      droneParticles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        tx:x,
        ty:y
      });
    }
  }
 }
}

function drawDrone(){

 ctx.save();
 ctx.shadowBlur = 8;
 ctx.shadowColor = "#66ccff";

 droneParticles.forEach((p,i)=>{

   p.x += (p.tx - p.x)*0.045;
   p.y += (p.ty - p.y)*0.045;

   let flicker = 0.75 + Math.sin(Date.now()*0.01 + i)*0.25;
   ctx.globalAlpha = flicker;

   let hue = 200 + Math.sin(i*0.1)*20;
   ctx.fillStyle = `hsl(${hue},100%,70%)`;

   ctx.beginPath();
   ctx.arc(p.x, p.y, 1.8, 0, Math.PI*2);
   ctx.fill();

 });

 ctx.restore();
}

// ================= AURORA =================
let auroraTime = 0;

function drawAurora(){

 auroraTime += 0.025;

 const t = auroraTime;

 ctx.save();
 ctx.globalAlpha = 0.38;
 ctx.filter = "blur(3px)";

 const count = 14;

 for(let i=0;i<count;i++){

   let baseX=(i/count)*canvas.width;
   let width=canvas.width/count*1.6;

   let hue=350 + Math.sin(t + i)*25;

   let g=ctx.createLinearGradient(baseX,0,baseX,canvas.height*0.7);

   g.addColorStop(0,`hsla(${hue},100%,65%,0.35)`);
   g.addColorStop(0.5,`hsla(${hue+20},100%,55%,0.25)`);
   g.addColorStop(1,"transparent");

   ctx.fillStyle=g;

   ctx.beginPath();

   for(let y=0;y<canvas.height*0.7;y+=4){

     let wave =
       Math.sin(y*0.008+t*2+i*0.3)*35 +
       Math.sin(y*0.02+t*1.5+i)*18;

     let x = baseX + wave;

     if(y===0) ctx.moveTo(x,y);
     else ctx.lineTo(x,y);
   }

   for(let y=canvas.height*0.7;y>=0;y-=4){

     let wave =
       Math.sin(y*0.008+t*2+i*0.3)*35 +
       Math.sin(y*0.02+t*1.5+i)*18;

     let x = baseX + wave + width;

     ctx.lineTo(x,y);
   }

   ctx.closePath();
   ctx.fill();
 }

 ctx.restore();
}

// ================= FIREWORKS =================
let rockets=[], sparks=[];

function launchRocket(){
 rockets.push({
  x:Math.random()*canvas.width,
  y:canvas.height,
  vx:(Math.random()-0.5)*1.2,
  vy:-(Math.random()*4+6),
  exploded:false
 });
}

let fireworkTimer = setInterval(launchRocket,1000);

function explode(x,y){

 const isDrone = (txtStyle==="drone");

 const speedScale = isDrone ? 1.5 : 1.15;
 const count = isDrone ? 120 : 90;

 const colors=["#ff3b3b","#ff6b6b","#ff2e63","#ff8c42","#ffd166","#ffffff"];
 let c=colors[Math.floor(Math.random()*colors.length)];

 for(let i=0;i<count;i++){

   let a=Math.random()*Math.PI*2;
   let s=(Math.random()*2.4+1.2)*speedScale;

   sparks.push({
     x,y,
     px:x,
     py:y,
     vx:Math.cos(a)*s,
     vy:Math.sin(a)*s,
     life:75,
     maxLife:75,
     size:Math.random()*1.2+0.7,
     color:c
   });
 }
}

function drawFireworks(){

 rockets.forEach((r,i)=>{
   r.x+=r.vx;
   r.y+=r.vy;
   r.vy+=0.08;

   ctx.save();
   ctx.shadowBlur=4;
   ctx.shadowColor="#fff";
   ctx.fillStyle="#fff";
   ctx.fillRect(r.x,r.y,2,8);
   ctx.restore();

   if(r.vy>0 && !r.exploded){
     explode(r.x,r.y);
     r.exploded=true;
   }

   if(r.y>canvas.height+50 || r.exploded){
     rockets.splice(i,1);
   }
 });

 sparks.forEach((s,i)=>{

   s.px=s.x;
   s.py=s.y;

   s.x+=s.vx;
   s.y+=s.vy;
   s.vy+=0.035;
   s.vx*=0.992;
   s.vy*=0.992;
   s.life--;

   let alpha=s.life/s.maxLife;

   ctx.save();

   // 샤프한 불꽃
   ctx.globalAlpha=alpha;
   ctx.shadowBlur=0;
   ctx.strokeStyle=s.color;
   ctx.lineWidth=s.size;
   ctx.lineCap="round";

   ctx.beginPath();
   ctx.moveTo(s.x, s.y);
   ctx.lineTo(s.x - s.vx*3.2, s.y - s.vy*3.2);
   ctx.stroke();

   // 끝부분 작은 밝은 점
   ctx.globalAlpha=alpha*0.7;
   ctx.fillStyle="#ffffff";
   ctx.beginPath();
   ctx.arc(s.x, s.y, 0.7, 0, Math.PI*2);
   ctx.fill();

   ctx.restore();

   if(s.life<=0) sparks.splice(i,1);
 });
}

// ================= START =================
async function start(){

 try{
   streamRef = await navigator.mediaDevices.getUserMedia({
     video:{facingMode:"environment"},
     audio:false
   });

   video.srcObject = streamRef;
   await video.play();

   intro.style.display="none";

   await countdown();

   if(txtStyle==="cloud") initCloud();
   if(txtStyle==="drone") initDrone();

   draw();

 }catch(err){
   alert("카메라를 사용할 수 없습니다. 권한을 확인해주세요.");
   console.error(err);
 }
}

function countdown(){
 return new Promise(res=>{
  let c=3;
  count.innerText=c;
  let t=setInterval(()=>{
   c--;
   if(c>0) count.innerText=c;
   else{
     count.innerText="";
     clearInterval(t);
     res();
   }
  },1000);
 });
}

// ================= DRAW =================
function draw(){

 if(txtStyle==="drone" || txtStyle==="cloud"){
   ctx.clearRect(0,0,canvas.width,canvas.height);
 }
 else{
   ctx.globalCompositeOperation="destination-out";
   ctx.fillStyle="rgba(0,0,0,0.08)";
   ctx.fillRect(0,0,canvas.width,canvas.height);
   ctx.globalCompositeOperation="source-over";
 }

 if(effStyle==="aurora") drawAurora();
 if(effStyle==="fireworks") drawFireworks();

 if(txtStyle==="standard") drawStandard();
 if(txtStyle==="cloud") drawCloud();
 if(txtStyle==="drone") drawDrone();

 requestAnimationFrame(draw);
}

// ================= APP =================
function goApp(){
 location.href="https://play.google.com/store/apps/details?id=com.example.hearmesky";
}

</script>
</body>
</html>
