<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{margin:0;padding:0;overflow:hidden;background:black;font-family:Arial;}

video,canvas{
position:fixed;
top:0;left:0;width:100%;height:100%;
object-fit:cover;
}

canvas{z-index:1;}
video{z-index:0;}

#intro{
position:fixed;width:100%;height:100%;
background:black;z-index:10;
display:flex;justify-content:center;align-items:center;
color:white;
flex-direction:column;
}

h1{margin-bottom:20px;}

button{
margin:10px;
padding:15px 30px;
border-radius:30px;
border:none;
font-size:18px;
width:200px;
}

.startBtn{background:red;color:white;}
.appBtn{background:white;color:black;}

#count{
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:100px;color:white;z-index:5;
}
</style>
</head>

<body>

<div id="intro">
  <h1>HearMeSKY</h1>
  <button class="startBtn" onclick="start()">START</button>
  <button class="appBtn">APP 가입</button>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="count"></div>

<script>

// ===== PARAM =====
const p=new URLSearchParams(location.search);
const text=(p.get("msg")||"WE LOVE GINA").replaceAll("_"," ");
const txtStyle=p.get("txtsty")||"standard";
const effStyle=p.get("effsty")||"fireworks";

const video=document.getElementById("video");
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

let stream=null;

// ===== RESIZE =====
function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
}
resize();
onresize=resize;

// ===== CAMERA =====
async function initCamera(){
 if(stream) return;
 stream=await navigator.mediaDevices.getUserMedia({
   video:{facingMode:"environment"},
   audio:false
 });
 video.srcObject=stream;
 await video.play();
}

// ===== COUNTDOWN =====
async function countdown(){
 const el=document.getElementById("count");
 for(let i=3;i>=1;i--){
  el.innerText=i;
  await new Promise(r=>setTimeout(r,700));
 }
 el.innerText="";
}

// ===== TEXT =====
function drawText(){
 ctx.fillStyle="#fff";
 ctx.textAlign="center";
 ctx.font="bold 80px Arial";

 let words=text.split(" ");
 words.forEach((w,i)=>{
   ctx.fillText(w,canvas.width/2,canvas.height*0.35+i*90);
 });
}

// ===== FIREWORK =====
let fw=[];
let timer=0;

function launch(){
 fw.push({
   type:"rocket",
   x:canvas.width*(0.2+Math.random()*0.6),
   y:canvas.height,
   vy:-4-Math.random()*1.5,
   target:canvas.height*(0.4+Math.random()*0.1),
   exploded:false,
   color:["#ff4040","#ffd700","#66ccff","#cc66ff"][Math.floor(Math.random()*4)]
 });
}

function explode(x,y,color){

 console.log("explode"); // 디버그용

 for(let i=0;i<50;i++){
   let a=Math.random()*Math.PI*2;
   let s=2+Math.random()*2.5;

   fw.push({
     type:"spark",
     x,y,
     vx:Math.cos(a)*s,
     vy:Math.sin(a)*s,
     life:70,
     color
   });
 }
}

function drawFire(){

 timer++;
 if(timer%60===0) launch(); // 🔥 발사 줄임

 let next=[];

 fw.forEach(p=>{

   if(p.type==="rocket"){

     p.y+=p.vy;

     ctx.fillStyle=p.color;
     ctx.fillRect(p.x,p.y,3,8);

     // 🔥 핵심: 무조건 터지게
     if(p.y <= p.target && !p.exploded){
       explode(p.x,p.y,p.color);
       p.exploded=true;
     }else if(!p.exploded){
       next.push(p);
     }

   }else{

     p.x+=p.vx;
     p.y+=p.vy;
     p.vy+=0.04;
     p.life--;

     ctx.globalAlpha=p.life/70;
     ctx.strokeStyle=p.color;

     ctx.beginPath();
     ctx.moveTo(p.x,p.y);
     ctx.lineTo(p.x-p.vx*2,p.y-p.vy*2);
     ctx.stroke();

     if(p.life>0) next.push(p);
   }

 });

 fw=next;
 ctx.globalAlpha=1;
}

// ===== START =====
async function start(){

 await initCamera();
 document.getElementById("intro").style.display="none";

 await countdown();

 draw();
}

// ===== DRAW =====
function draw(){

 ctx.clearRect(0,0,canvas.width,canvas.height);

 drawText();

 if(effStyle==="fireworks") drawFire();

 requestAnimationFrame(draw);
}

</script>
</body>
</html>
