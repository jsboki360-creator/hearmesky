<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:Arial;
}

/* 카메라 */
video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;

/* 🔥 밤 느낌 (중요) */
filter:brightness(0.15) contrast(1.4);
}

/* 캔버스 */
canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

/* ================= START UI ================= */
#intro{
position:fixed;
width:100%;
height:100%;
background:black;
z-index:10;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.introBox{
text-align:center;
}

.introBox h1{
font-size:42px;
margin-bottom:30px;
letter-spacing:2px;
}

button{
display:block;
margin:12px auto;
padding:15px 30px;
border-radius:30px;
border:none;
font-size:18px;
width:220px;
}

.startBtn{
background:red;
color:white;
}

.appBtn{
background:white;
color:black;
}

/* ================= COUNT ================= */
#count{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:90px;
color:white;
z-index:5;
}
</style>
</head>

<body>

<div id="intro">
  <div class="introBox">
    <h1>HearMeSKY</h1>
    <button class="startBtn" onclick="start()">START</button>
    <button class="appBtn" onclick="goApp()">APP 가입</button>
  </div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="count"></div>

<script>

// ================= PARAM =================
const p = new URLSearchParams(location.search);
const text = (p.get("msg")||"WE LOVE GINA").replaceAll("_"," ");
const txtStyle = p.get("txtsty")||"standard";
const effStyle = p.get("effsty")||"none";

const video = document.getElementById("video");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
}
resize();
onresize=resize;

function textY(){ return canvas.height*0.42; }

// ================= STANDARD =================
function drawStandard(){
 ctx.fillStyle="#fff";
 ctx.font="bold 60px Arial";
 ctx.textAlign="center";
 ctx.shadowBlur=20;
 ctx.shadowColor="#fff";
 ctx.fillText(text,canvas.width/2,textY());
}

// ================= DRONE =================
let drone=[];
function initDrone(){
 drone=[];
 const off=document.createElement("canvas");
 const o=off.getContext("2d");

 off.width=canvas.width;
 off.height=canvas.height;

 o.fillStyle="#fff";
 o.font="bold 110px Arial";
 o.textAlign="center";
 o.fillText(text,canvas.width/2,textY());

 const img=o.getImageData(0,0,off.width,off.height);

 for(let y=0;y<off.height;y+=6){
  for(let x=0;x<off.width;x+=6){
    let i=(y*off.width+x)*4;
    if(img.data[i+3]>128){
      drone.push({x,y});
    }
  }
 }
}

function drawDrone(){
 ctx.fillStyle="#fff";
 drone.forEach(p=>{
   ctx.beginPath();
   ctx.arc(p.x,p.y,2.2,0,Math.PI*2);
   ctx.fill();
 });
}

// ================= CLOUD =================
let cloud=[];
function initCloud(){

 cloud=[];

 const off=document.createElement("canvas");
 const o=off.getContext("2d");

 off.width=canvas.width;
 off.height=canvas.height;

 o.fillStyle="#fff";
 o.font="bold 120px Arial";
 o.textAlign="center";
 o.fillText(text,canvas.width/2,textY());

 const img=o.getImageData(0,0,off.width,off.height);

 for(let y=0;y<off.height;y+=8){
  for(let x=0;x<off.width;x+=8){
    let i=(y*off.width+x)*4;
    if(img.data[i+3]>128){
      cloud.push({
        x,y,
        r:6 + Math.random()*6
      });
    }
  }
 }
}

function drawCloud(){

 cloud.forEach(p=>{

   let g=ctx.createRadialGradient(
     p.x,p.y,0,
     p.x,p.y,p.r
   );

   g.addColorStop(0,"rgba(255,255,255,0.9)");
   g.addColorStop(1,"rgba(255,255,255,0)");

   ctx.fillStyle=g;

   ctx.beginPath();
   ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
   ctx.fill();
 });
}

// ================= FIREWORK =================
let fireworks=[];

function explode(){

 let x=Math.random()*canvas.width;
 let y=Math.random()*canvas.height*0.35;

 for(let i=0;i<80;i++){
   let a=Math.random()*Math.PI*2;
   let s=Math.random()*3+1;

   fireworks.push({
     x,y,
     vx:Math.cos(a)*s,
     vy:Math.sin(a)*s,
     life:80
   });
 }
}

setInterval(()=>{ if(effStyle==="fireworks") explode(); },1200);

function drawFireworks(){

 fireworks.forEach((p,i)=>{

   p.x+=p.vx;
   p.y+=p.vy;
   p.vy+=0.02;
   p.life--;

   ctx.globalAlpha=p.life/80;
   ctx.fillStyle="#ff4d4d";

   ctx.beginPath();
   ctx.arc(p.x,p.y,1.8,0,Math.PI*2);
   ctx.fill();

   if(p.life<=0) fireworks.splice(i,1);
 });

 ctx.globalAlpha=1;
}

// ================= AURORA =================
function drawAurora(){

 const h=canvas.height*0.35;

 ctx.globalAlpha=0.25;

 for(let i=0;i<4;i++){

   let x=i*canvas.width/4;

   let g=ctx.createLinearGradient(x,0,x,h);

   g.addColorStop(0,"rgba(0,255,200,0.5)");
   g.addColorStop(0.5,"rgba(180,0,255,0.4)");
   g.addColorStop(1,"transparent");

   ctx.fillStyle=g;
   ctx.fillRect(x,0,canvas.width/4,h);
 }

 ctx.globalAlpha=1;
}

// ================= START =================
async function start(){

 let s=await navigator.mediaDevices.getUserMedia({video:true});
 video.srcObject=s;
 await video.play();

 intro.style.display="none";

 await countdown();

 if(txtStyle==="drone") initDrone();
 if(txtStyle==="cloud") initCloud();

 draw();
}

function countdown(){
 return new Promise(res=>{
  let c=3;
  count.innerText=c;
  let t=setInterval(()=>{
   c--;
   if(c>0) count.innerText=c;
   else{count.innerText="";clearInterval(t);res();}
  },1000);
 });
}

// ================= DRAW =================
function draw(){

 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(effStyle==="fireworks") drawFireworks();
 else if(effStyle==="aurora") drawAurora();

 if(txtStyle==="drone") drawDrone();
 else if(txtStyle==="cloud") drawCloud();
 else drawStandard();

 requestAnimationFrame(draw);
}

// ================= APP =================
function goApp(){
 alert("APP 연결 예정");
}

</script>
</body>
</html>
