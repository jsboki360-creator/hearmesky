<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
 margin:0;
 padding:0;
 background:black;
 overflow:hidden;
 font-family:Arial;
}

canvas{
 position:fixed;
 top:0;left:0;
 width:100%;
 height:100%;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<script>

// ================= PARAM =================
const p = new URLSearchParams(location.search);

const text = (p.get("msg") || "WE LOVE GINA").replaceAll("_"," ");
const txtStyle = p.get("txtsty") || "standard";

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// ================= RESIZE =================
function resize(){
 canvas.width = innerWidth;
 canvas.height = innerHeight;
}
resize();
onresize = resize;

// ================= TEXT SPLIT =================
function getLines(){

 // 단어 기준 줄바꿈
 let words = text.split(" ");
 let lines = [];

 if(words.length <= 2){
   lines = [words.join(" ")];
 }else{
   let half = Math.ceil(words.length / 2);
   lines.push(words.slice(0,half).join(" "));
   lines.push(words.slice(half).join(" "));
 }

 return lines;
}

// ================= STANDARD =================
function drawStandard(){

 let lines = getLines();

 ctx.fillStyle = "#fff";
 ctx.textAlign = "center";

 let size = 90;
 ctx.font = "bold " + size + "px Arial";

 lines.forEach((l,i)=>{
   ctx.fillText(l, canvas.width/2, canvas.height*0.4 + i*100);
 });
}

// ================= CLOUD =================
let cloud = [];

function initCloud(){

 cloud = [];

 const off = document.createElement("canvas");
 const o = off.getContext("2d");

 off.width = canvas.width;
 off.height = canvas.height;

 let lines = getLines();

 o.fillStyle = "#fff";
 o.textAlign = "center";
 o.font = "bold 90px Arial";

 lines.forEach((l,i)=>{
   o.fillText(l, canvas.width/2, canvas.height*0.4 + i*100);
 });

 let img = o.getImageData(0,0,off.width,off.height);

 for(let y=0;y<off.height;y+=6){
  for(let x=0;x<off.width;x+=6){

    let i=(y*off.width+x)*4;

    if(img.data[i+3] > 120){

      cloud.push({
        x:x,
        y:y,
        r:10 + Math.random()*12
      });
    }
  }
 }
}

function drawCloud(){

 // 🔥 구름 덩어리
 cloud.forEach(p=>{

   let g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);

   g.addColorStop(0,"rgba(255,255,255,0.9)");
   g.addColorStop(0.5,"rgba(255,255,255,0.4)");
   g.addColorStop(1,"rgba(255,255,255,0)");

   ctx.fillStyle = g;

   ctx.beginPath();
   ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
   ctx.fill();
 });

 // 🔥 중앙 선명 보강 (핵심)
 ctx.fillStyle = "rgba(255,255,255,0.85)";
 ctx.textAlign = "center";
 ctx.font = "bold 90px Arial";

 let lines = getLines();
 lines.forEach((l,i)=>{
   ctx.fillText(l, canvas.width/2, canvas.height*0.4 + i*100);
 });
}

// ================= DRONE =================
let drone = [];

function initDrone(){

 drone = [];

 const off = document.createElement("canvas");
 const o = off.getContext("2d");

 off.width = canvas.width;
 off.height = canvas.height;

 let lines = getLines();

 o.fillStyle = "#fff";
 o.textAlign = "center";
 o.font = "bold 90px Arial";

 lines.forEach((l,i)=>{
   o.fillText(l, canvas.width/2, canvas.height*0.4 + i*100);
 });

 let img = o.getImageData(0,0,off.width,off.height);

 for(let y=0;y<off.height;y+=8){
  for(let x=0;x<off.width;x+=8){

    let i=(y*off.width+x)*4;

    if(img.data[i+3] > 120){

      drone.push({x,y});
    }
  }
 }
}

function drawDrone(){

 ctx.fillStyle = "#fff";

 drone.forEach(p=>{
   ctx.beginPath();
   ctx.arc(p.x,p.y,2.5,0,Math.PI*2);
   ctx.fill();
 });
}

// ================= INIT =================
if(txtStyle === "cloud") initCloud();
if(txtStyle === "drone") initDrone();

// ================= DRAW =================
function draw(){

 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(txtStyle === "cloud") drawCloud();
 else if(txtStyle === "drone") drawDrone();
 else drawStandard();

 requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
