<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:Arial;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
filter:brightness(0.6);
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

#intro{
position:fixed;
width:100%;
height:100%;
background:black;
z-index:10;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.introBox{text-align:center;}

button{
display:block;
margin:12px auto;
padding:15px 30px;
border-radius:30px;
border:none;
font-size:18px;
width:220px;
}

.startBtn{background:red;color:white;}
.appBtn{background:white;color:black;}

#count{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:100px;
color:white;
z-index:5;
}
</style>
</head>

<body>

<div id="intro">
  <div class="introBox">
    <h1>HearMeSKY</h1>
    <button class="startBtn" onclick="start()">START</button>
    <button class="appBtn" onclick="goApp()">APP 가입</button>
  </div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="count"></div>

<script>

// ================= PARAM =================
const params = new URLSearchParams(location.search);

const text = (params.get("msg") || "WE LOVE YOU").replaceAll("_"," ");
const txtStyle = params.get("txtsty") || "standard";
const effStyle = params.get("effsty") || "aurora";

// ================= SETUP =================
const video = document.getElementById("video");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
}
resize();
onresize=resize;

let streamRef;

// ================= COMMON =================
function drawMultiline(ctx,text,x,y,maxWidth,lineHeight){
 let words=text.split(" "), line="", lines=[];
 for(let w of words){
   let test=line+w+" ";
   if(ctx.measureText(test).width>maxWidth){
     lines.push(line); line=w+" ";
   }else line=test;
 }
 lines.push(line);

 let startY=y-(lines.length*lineHeight)/2;

 lines.forEach((l,i)=>{
   ctx.fillText(l.trim(),x,startY+i*lineHeight);
 });
}

// ================= STANDARD =================
function drawStandard(){
 ctx.fillStyle="#ffffff";
 ctx.font="bold 48px Arial";
 ctx.textAlign="center";
 ctx.textBaseline="middle";
 drawMultiline(ctx,text,canvas.width/2,canvas.height/2,canvas.width*0.8,60);
}

// ================= CLOUD =================
let cloudImage;

function initCloud(){

 const off = document.createElement("canvas");
 const o = off.getContext("2d");

 off.width = canvas.width;
 off.height = canvas.height;

 let size = Math.min(canvas.width/6, canvas.height/4);

 // 텍스트
 o.fillStyle="white";
 o.font=`bold ${size}px Arial`;
 o.textAlign="center";
 o.textBaseline="middle";

 drawMultiline(o,text,canvas.width/2,canvas.height/2,canvas.width*0.8,size*1.2);

 // 🔥 blur로 구름 만들기
 o.globalCompositeOperation="source-over";
 o.filter="blur(20px)";
 o.drawImage(off,0,0);

 // 저장
 cloudImage = off;
}
function drawCloud(){

 ctx.save();

 ctx.globalAlpha = 0.9;

 // 🔥 살짝 흔들림 (구름 느낌)
 let drift = Math.sin(Date.now()*0.001)*5;

 ctx.drawImage(cloudImage, drift, 0);

 ctx.restore();
}
// ================= DRONE LED =================
let droneParticles=[];

function initDrone(){
 const off=document.createElement("canvas");
 const o=off.getContext("2d");

 off.width=canvas.width;
 off.height=canvas.height;

 let size=Math.min(canvas.width/6,canvas.height/4);

 o.fillStyle="white";
 o.font=`bold ${size}px Arial`;
 o.textAlign="center";
 o.textBaseline="middle";

 drawMultiline(o,text,canvas.width/2,canvas.height/2,canvas.width*0.8,size*1.2);

 const img=o.getImageData(0,0,off.width,off.height);

 droneParticles=[];

 for(let y=0;y<off.height;y+=6){
  for(let x=0;x<off.width;x+=6){
    let i=(y*off.width+x)*4;
    if(img.data[i+3]>128){
      droneParticles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        tx:x,
        ty:y
      });
    }
  }
 }
}

function drawDrone(){

 ctx.save();

 ctx.shadowBlur = 10;
 ctx.shadowColor = "#66ccff";

 droneParticles.forEach((p,i)=>{

   p.x += (p.tx - p.x)*0.04;
   p.y += (p.ty - p.y)*0.04;

   let flicker = 0.7 + Math.sin(Date.now()*0.01 + i)*0.3;
   ctx.globalAlpha = flicker;

   let hue = 200 + Math.sin(i*0.1)*20;
   ctx.fillStyle = `hsl(${hue},100%,70%)`;

   ctx.beginPath();
   ctx.arc(p.x, p.y, 1.8, 0, Math.PI*2);
   ctx.fill();

 });

 ctx.restore();
}

// ================= AURORA (RED) =================
function drawAurora(){

 const t = Date.now()*0.0005;

 ctx.save();

 // 🔥 더 진하게
 ctx.globalAlpha = 0.38;

 // 🔥 너무 번지지 않게
 ctx.filter = "blur(3px)";

 const count = 14;

 for(let i=0;i<count;i++){

   let baseX = (i/count)*canvas.width;
   let width = canvas.width/count*1.6;

   // 🔴 붉은 계열 (조금 더 넓게)
   let hue = 350 + Math.sin(t + i)*25; // red ~ magenta

   let g = ctx.createLinearGradient(baseX,0,baseX,canvas.height*0.7);

   g.addColorStop(0,`hsla(${hue},100%,65%,0.35)`);
   g.addColorStop(0.5,`hsla(${hue+20},100%,55%,0.25)`);
   g.addColorStop(1,"transparent");

   ctx.fillStyle = g;

   ctx.beginPath();

   for(let y=0;y<canvas.height*0.7;y+=4){

     let wave =
       Math.sin(y*0.008+t*2+i*0.3)*35 +
       Math.sin(y*0.02+t*1.5+i)*18;

     let x = baseX + wave;

     if(y===0) ctx.moveTo(x,y);
     else ctx.lineTo(x,y);
   }

   for(let y=canvas.height*0.7;y>=0;y-=4){

     let wave =
       Math.sin(y*0.008+t*2+i*0.3)*35 +
       Math.sin(y*0.02+t*1.5+i)*18;

     let x = baseX + wave + width;

     ctx.lineTo(x,y);
   }

   ctx.closePath();
   ctx.fill();
 }

 ctx.restore();
}
// ================= FIREWORKS (RED) =================
let rockets=[], sparks=[];

function launchRocket(){
 rockets.push({
  x:Math.random()*canvas.width,
  y:canvas.height,
  vx:(Math.random()-0.5),
  vy:-(Math.random()*4+6),
  exploded:false
 });
}
setInterval(launchRocket,1200);

function explode(x,y){

 const colors = [
  "#ff3b3b",
  "#ff6b6b",
  "#ff2e63",
  "#ff8c42",
  "#ff0000"
 ];

 let c = colors[Math.floor(Math.random()*colors.length)];

 for(let i=0;i<60;i++){
   let a=Math.random()*Math.PI*2;
   let s=Math.random()*2+1;

   sparks.push({
     x,y,
     vx:Math.cos(a)*s,
     vy:Math.sin(a)*s,
     life:80,
     size:Math.random()*2+1,
     color:c
   });
 }
}

function drawFireworks(){

 rockets.forEach(r=>{
   r.x+=r.vx;
   r.y+=r.vy;
   r.vy+=0.08;

   ctx.fillStyle="#fff";
   ctx.fillRect(r.x,r.y,2,6);

   if(r.vy>0 && !r.exploded){
     explode(r.x,r.y);
     r.exploded=true;
   }
 });

 sparks.forEach((s,i)=>{
   s.x+=s.vx;
   s.y+=s.vy;
   s.vy+=0.03;
   s.life--;

   ctx.globalAlpha=s.life/80;
   ctx.fillStyle=s.color;
   ctx.beginPath();
   ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
   ctx.fill();
   ctx.globalAlpha=1;

   if(s.life<=0) sparks.splice(i,1);
 });
}

// ================= START =================
async function start(){

 streamRef = await navigator.mediaDevices.getUserMedia({
   video:{facingMode:"environment"}
 });

 video.srcObject = streamRef;
 await video.play();

 intro.style.display="none";

 await countdown();

 if(txtStyle==="cloud") initCloud();
 if(txtStyle==="drone") initDrone();

 draw();
}

function countdown(){
 return new Promise(res=>{
  let c=3;
  count.innerText=c;
  let t=setInterval(()=>{
   c--;
   if(c>0) count.innerText=c;
   else{count.innerText="";clearInterval(t);res();}
  },1000);
 });
}

// ================= DRAW =================
function draw(){

 if(txtStyle==="drone"){
   ctx.clearRect(0,0,canvas.width,canvas.height);
 }else{
   ctx.globalCompositeOperation="destination-out";
   ctx.fillStyle="rgba(0,0,0,0.015)";
   ctx.fillRect(0,0,canvas.width,canvas.height);
   ctx.globalCompositeOperation="source-over";
 }

 if(effStyle==="aurora") drawAurora();
 if(effStyle==="fireworks") drawFireworks();

 if(txtStyle==="standard") drawStandard();
 if(txtStyle==="cloud") drawCloud();
 if(txtStyle==="drone") drawDrone();

 requestAnimationFrame(draw);
}

// ================= APP =================
function goApp(){
 location.href="https://play.google.com/store/apps/details?id=com.example.hearmesky";
}

</script>
</body>
</html>
