<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
}

video {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

canvas {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:1;
}

#intro{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  z-index:10;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  flex-direction:column;
}

button{
  margin:10px;
  padding:15px 30px;
  border-radius:30px;
  border:none;
  font-size:18px;
}

.startBtn{background:red;color:white;}
.appBtn{background:white;color:black;}

#count{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:100px;
  color:white;
  z-index:5;
}
</style>
</head>

<body>

<div id="intro">
  <h1>HearMeSKY</h1>
  <button class="startBtn" onclick="start()">START</button>
  <button class="appBtn">APP 가입</button>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="count"></div>

<script>

// ================= PARAM =================
const p = new URLSearchParams(location.search);
const text = (p.get("msg")||"WE LOVE GINA").replaceAll("_"," ");
const txtStyle = p.get("txtsty")||"standard";
const effStyle = p.get("effsty")||"none";

const video = document.getElementById("video");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let stream = null;

// ================= RESIZE =================
function resize(){
 canvas.width = innerWidth;
 canvas.height = innerHeight;
}
resize();
onresize = resize;

// ================= CAMERA =================
async function initCamera(){
 if(stream) return;

 stream = await navigator.mediaDevices.getUserMedia({
   video:{facingMode:"environment"},
   audio:false
 });

 video.srcObject = stream;
 await video.play();
}

// ================= COUNTDOWN =================
async function countdown(){
 const el = document.getElementById("count");

 for(let i=3;i>=1;i--){
  el.innerText = i;
  await new Promise(r=>setTimeout(r,700));
 }

 el.innerText = "";
}

// ================= TEXT (기본) =================
function drawText(){

 ctx.fillStyle="#fff";
 ctx.textAlign="center";
 ctx.font="bold 80px Arial";

 let words = text.split(" ");

 words.forEach((w,i)=>{
   ctx.fillText(w, canvas.width/2, canvas.height*0.4 + i*90);
 });
}

// ================= START =================
async function start(){

 await initCamera();

 document.getElementById("intro").style.display="none";

 await countdown();

 draw();
}

// ================= DRAW =================
function draw(){

 ctx.clearRect(0,0,canvas.width,canvas.height);

 // 🔥 텍스트만 (아직 효과 X)
 drawText();

 requestAnimationFrame(draw);
}

</script>
</body>
</html>
