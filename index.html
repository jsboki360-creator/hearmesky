<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:Arial;
}

/* 📷 카메라 */
video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
filter:brightness(0.5) contrast(1.1);
}

/* 🎆 캔버스 */
canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

/* 인트로 */
#intro{
position:fixed;
width:100%;
height:100%;
background:black;
z-index:10;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.introBox{text-align:center;}

button{
display:block;
margin:12px auto;
padding:15px 30px;
border-radius:30px;
border:none;
font-size:18px;
width:220px;
}

.startBtn{background:red;color:white;}
.appBtn{background:white;color:black;}

#count{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
color:white;
z-index:5;
}
</style>
</head>

<body>

<div id="intro">
  <div class="introBox">
    <h1>HearMeSKY</h1>
    <button class="startBtn" onclick="start()">START</button>
    <button class="appBtn" onclick="goApp()">APP 가입</button>
  </div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="count"></div>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
}
resize();
onresize=resize;

// ======================
// TEXT
// ======================
const rawText = new URLSearchParams(location.search).get("msg") || "WE LOVE YOU";
const text = rawText.replaceAll("_"," ");

let particles=[];

function drawMultiline(ctx,text,x,y,maxWidth,lineHeight){
 let words=text.split(" ");
 let line="",lines=[];

 for(let w of words){
   let test=line+w+" ";
   if(ctx.measureText(test).width>maxWidth){
     lines.push(line);
     line=w+" ";
   }else{
     line=test;
   }
 }
 lines.push(line);
 lines=lines.slice(0,3);

 let startY=y-(lines.length*lineHeight)/2;

 lines.forEach((l,i)=>{
   ctx.fillText(l.trim(),x,startY+i*lineHeight);
 });
}

function buildText(){

 const off=document.createElement("canvas");
 const o=off.getContext("2d");

 off.width=canvas.width;
 off.height=canvas.height;

 let size=Math.min(canvas.width/7,canvas.height/4);

 o.fillStyle="white";
 o.font=`bold ${size}px Arial`;
 o.textAlign="center";
 o.textBaseline="middle";

 drawMultiline(o,text,canvas.width/2,canvas.height/2,canvas.width*0.8,size*1.3);

 const img=o.getImageData(0,0,off.width,off.height);

 particles=[];

 for(let y=0;y<off.height;y+=6){
  for(let x=0;x<off.width;x+=6){
   let i=(y*off.width+x)*4;
   if(img.data[i+3]>128){
    particles.push({
     x:Math.random()*canvas.width,
     y:Math.random()*canvas.height,
     tx:x,
     ty:y
    });
   }
  }
 }
}

// ======================
// FIREWORKS
// ======================
let rockets=[];
let sparks=[];
const fireColors=["#ff4040","#ffcc00","#ffffff"];

function launchRocket(){
 rockets.push({
  x:Math.random()*canvas.width,
  y:canvas.height,
  vx:(Math.random()-0.5)*1,
  vy:-(Math.random()*5+7)
 });
}

function explode(x,y){

 const baseColor=fireColors[Math.floor(Math.random()*fireColors.length)];

 for(let i=0;i<100;i++){
  let a=Math.random()*Math.PI*2;
  let s=Math.random()*3+1.5;

  sparks.push({
   x,y,
   vx:Math.cos(a)*s,
   vy:Math.sin(a)*s,
   life:90,
   color:baseColor
  });
 }
}

setInterval(launchRocket,1000);

// ======================
// START
// ======================
async function start(){

 try{
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });

  video.srcObject = stream;

 }catch(e){
  alert("카메라 권한 필요");
 }

 document.getElementById("intro").style.display="none";

 await countdown();

 buildText();
 draw();
}

function countdown(){
 return new Promise(res=>{
  let c=3;
  count.innerText=c;

  let t=setInterval(()=>{
   c--;
   if(c>0){
    count.innerText=c;
   }else{
    count.innerText="";
    clearInterval(t);
    res();
   }
  },1000);
 });
}

// ======================
// DRAW
// ======================
function draw(){

 // 🔥 핵심: 투명 배경 (카메라 보이게)
 ctx.fillStyle="rgba(0,0,0,0.08)";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 // 🚀 로켓
 rockets.forEach((r,i)=>{
  r.x+=r.vx;
  r.y+=r.vy;
  r.vy+=0.1;

  ctx.fillStyle="#fff";
  ctx.fillRect(r.x,r.y,2,5);

  if(r.vy>0){
    explode(r.x,r.y);
    rockets.splice(i,1);
  }
 });

 // ✨ 불꽃
 sparks.forEach((s,i)=>{
  s.x+=s.vx;
  s.y+=s.vy;

  s.vy+=0.03;
  s.vx*=0.985;

  s.life--;

  ctx.globalAlpha=s.life/90;
  ctx.fillStyle=s.color;

  ctx.beginPath();
  ctx.arc(s.x,s.y,2.2,0,Math.PI*2);
  ctx.fill();

  ctx.globalAlpha=1;

  if(s.life<=0){
    sparks.splice(i,1);
  }
 });

 // 🛸 드론 텍스트
 ctx.fillStyle="#ffffff";

 particles.forEach(p=>{
  p.x+=(p.tx-p.x)*0.02;
  p.y+=(p.ty-p.y)*0.02;
  ctx.fillRect(p.x,p.y,2,2);
 });

 requestAnimationFrame(draw);
}

// ======================
function goApp(){
 location.href="https://play.google.com/store/apps/details?id=com.example.hearmesky";
}

</script>
</body>
</html>
