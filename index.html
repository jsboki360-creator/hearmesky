<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin:0;
  padding:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
}

video {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

canvas {
  position:fixed;
  width:100%;
  height:100%;
  z-index:1;
}

#intro {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  z-index:50;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.introBox {
  text-align:center;
}

.introBox button {
  display:block;
  margin:12px auto;
  padding:15px 30px;
  font-size:18px;
  border:none;
  border-radius:30px;
  width:220px;
}

.startBtn { background:red; color:white; }
.appBtn { background:white; color:black; }

#countdownText {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:120px;
  color:white;
  z-index:30;
}
</style>
</head>

<body>

<div id="intro">
  <div class="introBox">
    <h1>HearMeSKY</h1>
    <button class="startBtn" onclick="enter()">START</button>
    <button class="appBtn" onclick="goApp()">APP 가입</button>
  </div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="countdownText"></div>

<script>

// =======================
// 🔥 파라미터
// =======================
const params = new URLSearchParams(location.search);
let text = params.get("msg") || "";
let txtStyle = params.get("txtsty") || "none";
let effStyle = params.get("effsty") || "fireworks";

// =======================
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
onresize = resize;

// =======================
// 📱 앱 이동
// =======================
function goApp(){
    location.href = "https://play.google.com/store/apps/details?id=com.example.hearmesky";
}

// =======================
// 📷 카메라
// =======================
async function requestCamera(){
    try{
        const stream = await navigator.mediaDevices.getUserMedia({
            video:{facingMode:"environment"}
        });
        video.srcObject = stream;
        return true;
    }catch{
        alert("카메라 필요");
        return false;
    }
}

// =======================
// 시작
// =======================
async function enter(){
    const ok = await requestCamera();
    if(!ok) return;

    intro.style.display = "none";

    await runCountdown();

    startShow();
}

// =======================
// 카운트
// =======================
function runCountdown(){
    return new Promise(res=>{
        const el = document.getElementById("countdownText");
        let c = 3;
        el.innerText = c;

        const t = setInterval(()=>{
            c--;
            if(c>0){
                el.innerText = c;
            }else{
                el.innerText = "";
                clearInterval(t);
                res();
            }
        },1000);
    });
}

// =======================
// 🔥 불꽃 시스템
// =======================
let rockets = [];
let sparks = [];

const fireColors = [
 "#ff4040","#ffcc00","#00ccff",
 "#66ff66","#ff66ff","#ffffff"
];

// 🚀 로켓 발사
function launchRocket(){
    rockets.push({
        x: Math.random()*canvas.width,
        y: canvas.height,
        vx: (Math.random()-0.5)*2,
        vy: -(Math.random()*6 + 8),
        life: 60
    });
}

// 💥 폭발
function explode(x,y){

    const count = 120;

    for(let i=0;i<count;i++){

        const angle = Math.random()*Math.PI*2;
        const speed = Math.random()*5 + 2;

        sparks.push({
            x:x,
            y:y,
            vx:Math.cos(angle)*speed,
            vy:Math.sin(angle)*speed,
            life: 80,
            color: fireColors[Math.floor(Math.random()*fireColors.length)]
        });
    }
}

// 계속 발사
setInterval(()=>{
    if(effStyle==="fireworks"){
        launchRocket();
    }
}, 600);

// =======================
// 시작
// =======================
let started = false;

function startShow(){
    started = true;
    draw();
}

// =======================
// 🎬 애니메이션
// =======================
function draw(){

    if(!started) return;

    // 🔥 잔상
    ctx.fillStyle="rgba(0,0,0,0.2)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // 🚀 로켓
    rockets.forEach((r,i)=>{

        r.x += r.vx;
        r.y += r.vy;

        r.vy += 0.15;

        r.life--;

        ctx.fillStyle="#ffffff";
        ctx.fillRect(r.x, r.y, 2, 6);

        if(r.vy > 0 || r.life < 0){
            explode(r.x, r.y);
            rockets.splice(i,1);
        }
    });

    // ✨ 불꽃
    sparks.forEach((s,i)=>{

        s.x += s.vx;
        s.y += s.vy;

        s.vy += 0.05;
        s.vx *= 0.99;

        s.life--;

        ctx.globalAlpha = s.life / 80;
        ctx.fillStyle = s.color;

        ctx.beginPath();
        ctx.arc(s.x, s.y, 2, 0, Math.PI*2);
        ctx.fill();

        ctx.globalAlpha = 1;

        if(s.life <= 0){
            sparks.splice(i,1);
        }
    });

    requestAnimationFrame(draw);
}

</script>
</body>
</html>
