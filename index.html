<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:Arial;
}

/* 카메라 */
video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
filter:brightness(0.6) contrast(1.1);
pointer-events:none;
}

/* 캔버스 */
canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

/* 인트로 */
#intro{
position:fixed;
width:100%;
height:100%;
background:black;
z-index:10;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.introBox{text-align:center;}

button{
display:block;
margin:12px auto;
padding:15px 30px;
border-radius:30px;
border:none;
font-size:18px;
width:220px;
}

.startBtn{background:red;color:white;}
.appBtn{background:white;color:black;}

#count{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
color:white;
z-index:5;
}
</style>
</head>

<body>

<div id="intro">
  <div class="introBox">
    <h1>HearMeSKY</h1>
    <button class="startBtn" onclick="start()">START</button>
    <button class="appBtn" onclick="goApp()">APP 가입</button>
  </div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="count"></div>

<script>

// ======================
// PARAM
// ======================
const params = new URLSearchParams(location.search);

const rawText = params.get("msg") || "WE LOVE YOU";
const text = rawText.replaceAll("_"," ");

const txtStyle = params.get("txtsty") || "standard";
const effStyle = params.get("effsty") || "fireworks";

// ======================
const video = document.getElementById("video");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
}
resize();
onresize=resize;

let streamRef = null;

// ======================
// TEXT
// ======================
let particles=[];
let cloudParticles=[];

function drawMultiline(ctx,text,x,y,maxWidth,lineHeight){
 let words=text.split(" ");
 let line="",lines=[];

 for(let w of words){
   let test=line+w+" ";
   if(ctx.measureText(test).width>maxWidth){
     lines.push(line);
     line=w+" ";
   }else{
     line=test;
   }
 }
 lines.push(line);
 lines=lines.slice(0,3);

 let startY=y-(lines.length*lineHeight)/2;

 lines.forEach((l,i)=>{
   ctx.fillText(l.trim(),x,startY+i*lineHeight);
 });
}

function buildDroneText(){
 const off=document.createElement("canvas");
 const o=off.getContext("2d");

 off.width=canvas.width;
 off.height=canvas.height;

 let size=Math.min(canvas.width/7,canvas.height/4);

 o.fillStyle="white";
 o.font=`bold ${size}px Arial`;
 o.textAlign="center";
 o.textBaseline="middle";

 drawMultiline(o,text,canvas.width/2,canvas.height/2,canvas.width*0.8,size*1.3);

 const img=o.getImageData(0,0,off.width,off.height);

 particles=[];

 for(let y=0;y<off.height;y+=6){
  for(let x=0;x<off.width;x+=6){
   let i=(y*off.width+x)*4;
   if(img.data[i+3]>128){
    particles.push({
     x:Math.random()*canvas.width,
     y:Math.random()*canvas.height,
     tx:x,
     ty:y
    });
   }
  }
 }
}

function initCloud(){
 cloudParticles=[];
 for(let i=0;i<300;i++){
  cloudParticles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*3+1
  });
 }
}

// ======================
// FIREWORKS
// ======================
let rockets=[], sparks=[];
const fireColors=["#00ccff","#3399ff","#66ffff","#ffffff"];

function launchRocket(){
 rockets.push({
  x:Math.random()*canvas.width,
  y:canvas.height,
  vx:(Math.random()-0.5)*0.8,
  vy:-(Math.random()*4+6),
  exploded:false
 });
}
setInterval(launchRocket,1200);

function explode(x,y){
 const baseColor=fireColors[Math.floor(Math.random()*fireColors.length)];
 for(let i=0;i<80;i++){
  let a=Math.random()*Math.PI*2;
  let s=Math.random()*2.5+1;
  sparks.push({
   x,y,
   vx:Math.cos(a)*s,
   vy:Math.sin(a)*s,
   life:100,
   size:Math.random()*2+1,
   color:baseColor
  });
 }
}

function drawFireworks(){
 rockets.forEach((r,i)=>{
  r.x+=r.vx; r.y+=r.vy; r.vy+=0.08;
  ctx.fillStyle="#fff";
  ctx.fillRect(r.x,r.y,2,6);
  if(r.vy>0 && !r.exploded){
   explode(r.x,r.y);
   r.exploded=true;
  }
 });

 sparks.forEach((s,i)=>{
  s.x+=s.vx; s.y+=s.vy;
  s.vy+=0.03; s.vx*=0.98;
  s.life--;

  ctx.globalAlpha=s.life/100;
  ctx.fillStyle=s.color;
  ctx.beginPath();
  ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
  ctx.fill();
  ctx.globalAlpha=1;

  if(s.life<=0) sparks.splice(i,1);
 });
}

// ======================
// AURORA
// ======================
let aurora=[];

function initAurora(){
 aurora=[];
 for(let i=0;i<60;i++){
  aurora.push({
   x:Math.random()*canvas.width,
   y:Math.random()*canvas.height*0.5,
   offset:Math.random()*1000
  });
 }
}

function drawAurora(){
 ctx.globalAlpha=0.25;
 aurora.forEach(a=>{
  const wave=Math.sin(Date.now()*0.001+a.offset)*30;

  const g=ctx.createLinearGradient(a.x,a.y,a.x,a.y+200);
  g.addColorStop(0,"#00ffcc");
  g.addColorStop(1,"transparent");

  ctx.fillStyle=g;
  ctx.fillRect(a.x,a.y+wave,2,200);
 });
 ctx.globalAlpha=1;
}

// ======================
// RAINBOW
// ======================
function drawRainbow(){
 const t=Date.now()*0.002;
 for(let i=0;i<canvas.height;i+=4){
  const hue=(i*0.5+t*100)%360;
  ctx.strokeStyle=`hsla(${hue},100%,60%,0.12)`;
  ctx.beginPath();
  ctx.moveTo(0,i);
  ctx.lineTo(canvas.width,i+Math.sin(i*0.02+t)*20);
  ctx.stroke();
 }
}

// ======================
// START
// ======================
async function start(){

 if(!streamRef){
  streamRef=await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });
  video.srcObject=streamRef;
  await video.play();
 }

 intro.style.display="none";

 await countdown();

 if(txtStyle==="drone") buildDroneText();
 if(txtStyle==="cloud") initCloud();
 if(effStyle==="aurora") initAurora();

 draw();
}

function countdown(){
 return new Promise(res=>{
  let c=3;
  count.innerText=c;
  let t=setInterval(()=>{
   c--;
   if(c>0) count.innerText=c;
   else{count.innerText="";clearInterval(t);res();}
  },1000);
 });
}

// ======================
// DRAW
// ======================
function draw(){

 ctx.globalCompositeOperation="destination-out";
 ctx.fillStyle="rgba(0,0,0,0.06)";
 ctx.fillRect(0,0,canvas.width,canvas.height);
 ctx.globalCompositeOperation="source-over";

 // EFFECT
 if(effStyle==="fireworks") drawFireworks();
 if(effStyle==="aurora") drawAurora();
 if(effStyle==="rainbow") drawRainbow();

 // TEXT
 if(txtStyle==="standard"){
  ctx.fillStyle="#fff";
  ctx.font="bold 48px Arial";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  drawMultiline(ctx,text,canvas.width/2,canvas.height/2,canvas.width*0.8,60);
 }

 if(txtStyle==="drone"){
  particles.forEach(p=>{
   p.x+=(p.tx-p.x)*0.02;
   p.y+=(p.ty-p.y)*0.02;
   ctx.fillRect(p.x,p.y,2,2);
  });
 }

 if(txtStyle==="cloud"){
  ctx.fillStyle="rgba(255,255,255,0.2)";
  cloudParticles.forEach(p=>{
   p.x+=Math.sin(Date.now()*0.001+p.y)*0.2;
   ctx.beginPath();
   ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
   ctx.fill();
  });

  ctx.fillStyle="rgba(255,255,255,0.5)";
  ctx.font="bold 48px Arial";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  drawMultiline(ctx,text,canvas.width/2,canvas.height/2,canvas.width*0.8,60);
 }

 requestAnimationFrame(draw);
}

// ======================
function goApp(){
 location.href="https://play.google.com/store/apps/details?id=com.example.hearmesky";
}

</script>
</body>
</html>
