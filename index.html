<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{margin:0;padding:0;overflow:hidden;background:black;font-family:Arial;}
video,canvas{
position:fixed;
top:0;left:0;width:100%;height:100%;
object-fit:cover;
}
canvas{z-index:1;}
video{z-index:0;}

#intro{
position:fixed;width:100%;height:100%;
background:black;z-index:10;
display:flex;justify-content:center;align-items:center;
color:white;
}
button{
padding:15px 30px;border-radius:30px;
border:none;font-size:18px;
}
#count{
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:100px;color:white;z-index:5;
}
</style>
</head>

<body>

<div id="intro">
 <button onclick="start()">START</button>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="count"></div>

<script>

// ===== PARAM =====
const p=new URLSearchParams(location.search);
const text=(p.get("msg")||"WE LOVE GINA").replaceAll("_"," ");
const txtStyle=p.get("txtsty")||"standard";
const effStyle=p.get("effsty")||"none";

const video=document.getElementById("video");
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

let stream=null;

// ===== RESIZE =====
function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
}
resize();
onresize=resize;

// ===== CAMERA (후면 고정) =====
async function initCamera(){
 if(stream) return;
 stream=await navigator.mediaDevices.getUserMedia({
   video:{facingMode:"environment"},
   audio:false
 });
 video.srcObject=stream;
 await video.play();
}

// ===== COUNTDOWN =====
async function countdown(){
 const el=document.getElementById("count");
 for(let i=3;i>=1;i--){
  el.innerText=i;
  await new Promise(r=>setTimeout(r,700));
 }
 el.innerText="";
}

// ===== TEXT SPLIT =====
function getLines(){
 return text.split(" ");
}

// ===== STANDARD =====
function drawStandard(){
 let lines=getLines();
 ctx.fillStyle="#fff";
 ctx.textAlign="center";

 let size=80;
 ctx.font="bold "+size+"px Arial";

 lines.forEach((l,i)=>{
   ctx.fillText(l,canvas.width/2,canvas.height*0.35+i*90);
 });
}

// ===== DRONE =====
let drone=[];
function initDrone(){
 drone=[];
 const off=document.createElement("canvas");
 const o=off.getContext("2d");

 off.width=canvas.width;
 off.height=canvas.height;

 let lines=getLines();

 o.fillStyle="#fff";
 o.textAlign="center";
 o.font="bold 90px Arial";

 lines.forEach((l,i)=>{
   o.fillText(l,canvas.width/2,canvas.height*0.35+i*90);
 });

 let img=o.getImageData(0,0,off.width,off.height);

 for(let y=0;y<off.height;y+=7){
  for(let x=0;x<off.width;x+=7){
   let i=(y*off.width+x)*4;
   if(img.data[i+3]>128){
     drone.push({x,y});
   }
  }
 }
}
function drawDrone(){
 ctx.fillStyle="#fff";
 drone.forEach(p=>ctx.fillRect(p.x,p.y,2,2));
}

// ===== CLOUD =====
let cloud=[];
function initCloud(){
 cloud=[];
 const off=document.createElement("canvas");
 const o=off.getContext("2d");

 off.width=canvas.width;
 off.height=canvas.height;

 let lines=getLines();

 o.fillStyle="#fff";
 o.textAlign="center";
 o.font="bold 90px Arial";

 lines.forEach((l,i)=>{
   o.fillText(l,canvas.width/2,canvas.height*0.35+i*90);
 });

 let img=o.getImageData(0,0,off.width,off.height);

 for(let y=0;y<off.height;y+=8){
  for(let x=0;x<off.width;x+=8){
   let i=(y*off.width+x)*4;
   if(img.data[i+3]>128){
     cloud.push({
       x,y,
       r:10+Math.random()*8
     });
   }
  }
 }
}
function drawCloud(){
 cloud.forEach(p=>{
   let g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
   g.addColorStop(0,"rgba(255,255,255,0.9)");
   g.addColorStop(1,"rgba(255,255,255,0)");
   ctx.fillStyle=g;
   ctx.beginPath();
   ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
   ctx.fill();
 });

 // 🔥 중앙 선명 텍스트 보강 (핵심)
 drawStandard();
}

// ===== AURORA =====
let t=0;
function drawAurora(){
 t+=0.01;
 let h=canvas.height*0.3;

 ctx.globalAlpha=0.35;

 for(let i=0;i<3;i++){
   ctx.beginPath();
   for(let x=0;x<canvas.width;x+=5){
     let y=Math.sin(x*0.01+t+i)*20 + h*(0.4+i*0.2);
     ctx.lineTo(x,y);
   }
   ctx.lineTo(canvas.width,0);
   ctx.lineTo(0,0);
   ctx.closePath();

   let g=ctx.createLinearGradient(0,0,0,h);
   g.addColorStop(0,"rgba(0,255,200,0.4)");
   g.addColorStop(0.5,"rgba(200,0,255,0.3)");
   g.addColorStop(1,"transparent");

   ctx.fillStyle=g;
   ctx.fill();
 }
 ctx.globalAlpha=1;
}

// ===== FIREWORK =====
let fw=[];
let timer=0;

function launch(){
 fw.push({
   type:"rocket",
   x:canvas.width*(0.2+Math.random()*0.6),
   y:canvas.height,
   vy:-4,
   target:canvas.height*(0.3+Math.random()*0.2),
   color:["#ff4040","#ffd700","#66ccff","#cc66ff"][Math.floor(Math.random()*4)]
 });
}

function explode(x,y,color){
 for(let i=0;i<40;i++){
   let a=Math.random()*Math.PI*2;
   let s=2+Math.random()*2;
   fw.push({
     type:"spark",
     x,y,
     vx:Math.cos(a)*s,
     vy:Math.sin(a)*s,
     life:60,
     color
   });
 }
}

function drawFire(){
 timer++;
 if(timer%50===0) launch();

 let next=[];

 fw.forEach(p=>{
   if(p.type==="rocket"){
     p.y+=p.vy;
     ctx.fillStyle=p.color;
     ctx.fillRect(p.x,p.y,3,8);

     if(p.y<p.target){
       explode(p.x,p.y,p.color);
     }else next.push(p);

   }else{
     p.x+=p.vx;
     p.y+=p.vy;
     p.vy+=0.04;
     p.life--;

     ctx.globalAlpha=p.life/60;
     ctx.strokeStyle=p.color;
     ctx.beginPath();
     ctx.moveTo(p.x,p.y);
     ctx.lineTo(p.x-p.vx*2,p.y-p.vy*2);
     ctx.stroke();

     if(p.life>0) next.push(p);
   }
 });

 fw=next;
 ctx.globalAlpha=1;
}

// ===== START =====
async function start(){

 await initCamera();
 document.getElementById("intro").style.display="none";
 await countdown();

 if(txtStyle==="drone") initDrone();
 if(txtStyle==="cloud") initCloud();

 draw();
}

// ===== DRAW =====
function draw(){

 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(effStyle==="aurora") drawAurora();

 if(txtStyle==="drone") drawDrone();
 else if(txtStyle==="cloud") drawCloud();
 else drawStandard();

 if(effStyle==="fireworks") drawFire();

 requestAnimationFrame(draw);
}

</script>
</body>
</html>
