<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin:0;
  padding:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
}

video {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

canvas {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:1;
}

#intro {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  z-index:50;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.introBox {
  text-align:center;
}

.introBox h1 {
  font-size:42px;
  margin-bottom:10px;
}

.introBox p {
  opacity:0.75;
  margin-bottom:20px;
}

.introBox button {
  margin-top:20px;
  padding:15px 30px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background:red;
  color:white;
}

#countdownText {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:120px;
  font-weight:bold;
  color:white;
  z-index:30;
  text-shadow:0 0 18px rgba(255,255,255,0.35);
  pointer-events:none;
}
</style>
</head>

<body>

<div id="intro">
  <div class="introBox">
    <h1>HearMeSKY</h1>
    <p>하늘을 확인하세요</p>
    <button onclick="enter()">START</button>
  </div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="countdownText"></div>

<script>
let particles = [];
let started = false;
let streamReady = false;

const video = document.getElementById("video");
const intro = document.getElementById("intro");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

// 카메라
async function requestCamera(){
    if (streamReady) return true;

    try{
        const stream = await navigator.mediaDevices.getUserMedia({
            video:{ facingMode:"environment" },
            audio:false
        });
        video.srcObject = stream;
        streamReady = true;
        return true;
    }catch(e){
        alert("카메라 권한이 필요합니다.");
        return false;
    }
}

// 시작
async function enter(){
    const ok = await requestCamera();
    if(!ok) return;

    intro.style.display = "none";

    await runCountdown();

    startShow();
}

// 카운트다운
function runCountdown(){
    return new Promise(res=>{
        const el = document.getElementById("countdownText");
        let c = 3;
        el.innerText = c;

        const t = setInterval(()=>{
            c--;

            if(c > 0){
                el.innerText = c;
            }else{
                el.innerText = "";
                clearInterval(t);
                res();
            }
        }, 1000);
    });
}

// 메시지
const params = new URLSearchParams(location.search);
let text = params.get("msg") || "WE LOVE YOU";
text = text.replaceAll("_", " ");

if(text.length > 50){
    text = text.substring(0, 50) + "...";
}

// 자동 줄바꿈
function drawMultiline(ctx, text, x, y, maxWidth, lineHeight){
    const words = text.split(" ");
    let line = "";
    let lines = [];

    for(let i=0; i<words.length; i++){
        const test = line + words[i] + " ";
        const w = ctx.measureText(test).width;

        if(w > maxWidth && i > 0){
            lines.push(line.trim());
            line = words[i] + " ";
        }else{
            line = test;
        }
    }

    if(line.trim()) lines.push(line.trim());

    lines = lines.slice(0, 3);

    const startY = y - ((lines.length - 1) * lineHeight / 2);

    lines.forEach((l, i)=>{
        ctx.fillText(l, x, startY + i * lineHeight);
    });
}

// 입자 생성
function initParticles(txt){
    const off = document.createElement("canvas");
    const o = off.getContext("2d");

    off.width = canvas.width;
    off.height = canvas.height;

    let size = Math.min(canvas.width / 8, canvas.height / 5);
    o.fillStyle = "white";
    o.font = `bold ${size}px Arial`;
    o.textAlign = "center";
    o.textBaseline = "middle";

    drawMultiline(
        o,
        txt,
        canvas.width / 2,
        canvas.height / 2,
        canvas.width * 0.8,
        size * 1.3
    );

    const img = o.getImageData(0, 0, off.width, off.height);
    particles = [];

    for(let y=0; y<off.height; y+=6){
        for(let x=0; x<off.width; x+=6){
            const i = (y * off.width + x) * 4;

            if(img.data[i+3] > 128){
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    tx: x,
                    ty: y
                });
            }
        }
    }
}

// 쇼 시작
function startShow(){
    initParticles(text);
    started = true;
    draw();
}

// 애니메이션
function draw(){
    if(!started) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";

    particles.forEach(p=>{
        p.x += (p.tx - p.x) * 0.05;
        p.y += (p.ty - p.y) * 0.05;

        ctx.beginPath();
        ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
        ctx.fill();
    });

    requestAnimationFrame(draw);
}
</script>

</body>
</html>
