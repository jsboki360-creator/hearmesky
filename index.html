<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{margin:0;padding:0;overflow:hidden;background:black;font-family:Arial;}

video,canvas{
position:fixed;
top:0;left:0;width:100%;height:100%;
object-fit:cover;
}

canvas{z-index:1;}
video{z-index:0;}

#intro{
position:fixed;width:100%;height:100%;
background:black;z-index:10;
display:flex;justify-content:center;align-items:center;
color:white;
}

.introBox{text-align:center;}

button{
display:block;margin:10px auto;
padding:15px 30px;border-radius:30px;
border:none;font-size:18px;width:220px;
}

.startBtn{background:red;color:white;}
.appBtn{background:white;color:black;}

#camBtn{
position:fixed;bottom:20px;right:20px;
z-index:20;display:none;
}

#count{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:100px;color:white;z-index:5;
}
</style>
</head>

<body>

<div id="intro">
  <div class="introBox">
    <h1>HearMeSKY</h1>
    <button class="startBtn" onclick="start()">START</button>
    <button class="appBtn">APP 가입</button>
  </div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="count"></div>

<button id="camBtn" onclick="switchCamera()">카메라 전환</button>

<script>

// ===== PARAM =====
const p = new URLSearchParams(location.search);
const text = (p.get("msg")||"LOVE YOU").replaceAll("_"," ");

const video = document.getElementById("video");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let stream = null;
let currentFacing = "environment";
let started = false;

// ===== RESIZE =====
function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
}
resize();
onresize=resize;

// ===== CAMERA (🔥 1번만 요청) =====
async function initCamera(){

 if(stream) return;

 stream = await navigator.mediaDevices.getUserMedia({
   video:{ facingMode: currentFacing },
   audio:false
 });

 video.srcObject = stream;
 await video.play();
}

// ===== CAMERA SWITCH =====
async function switchCamera(){

 currentFacing = currentFacing==="environment" ? "user" : "environment";

 const track = stream.getVideoTracks()[0];
 await track.applyConstraints({
   facingMode: currentFacing
 });
}

// ===== COUNTDOWN =====
async function countdown(){
 const el=document.getElementById("count");

 for(let i=3;i>=1;i--){
  el.innerText=i;
  await new Promise(r=>setTimeout(r,700));
 }
 el.innerText="";
}

// ===== TEXT =====
function drawText(){
 let size=80;
 while(size>20){
  ctx.font="bold "+size+"px Arial";
  if(ctx.measureText(text).width<canvas.width*0.8) break;
  size-=2;
 }

 ctx.fillStyle="#fff";
 ctx.textAlign="center";
 ctx.fillText(text,canvas.width/2,canvas.height*0.4);
}

// ===== FIREWORK =====
let fw=[];

function launch(){
 fw.push({x:Math.random()*canvas.width,y:canvas.height,vy:-8});
}

function explode(x,y){
 for(let i=0;i<20;i++){
  let a=Math.random()*Math.PI*2;
  let s=2+Math.random()*3;
  fw.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:40});
 }
}

function drawFire(){

 let next=[];

 if(fw.length<40) launch();

 fw.forEach(p=>{
  if(!p.vx){
   p.y+=p.vy;
   ctx.fillStyle="#fff";
   ctx.fillRect(p.x,p.y,3,6);

   if(p.y<canvas.height*0.3) explode(p.x,p.y);
   else next.push(p);

  }else{
   p.x+=p.vx;
   p.y+=p.vy;
   p.vy+=0.05;
   p.life--;

   ctx.globalAlpha=p.life/40;
   ctx.fillStyle="#fff";
   ctx.fillRect(p.x,p.y,2,2);

   if(p.life>0) next.push(p);
  }
 });

 fw=next;
 ctx.globalAlpha=1;
}

// ===== START =====
async function start(){

 if(started) return;
 started=true;

 await initCamera(); // 🔥 한번만 요청

 document.getElementById("intro").style.display="none";
 document.getElementById("camBtn").style.display="block";

 await countdown();

 draw();
}

// ===== DRAW =====
function draw(){

 ctx.clearRect(0,0,canvas.width,canvas.height);

 drawFire();
 drawText();

 requestAnimationFrame(draw);
}

</script>
</body>
</html>
