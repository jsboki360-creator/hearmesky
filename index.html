<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:Arial;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

#intro{
position:fixed;
width:100%;
height:100%;
background:black;
z-index:10;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.introBox{text-align:center;}

.introBox h1{
font-size:42px;
margin-bottom:30px;
}

button{
display:block;
margin:12px auto;
padding:15px 30px;
border-radius:30px;
border:none;
font-size:18px;
width:220px;
}

.startBtn{background:red;color:white;}
.appBtn{background:white;color:black;}

#count{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:90px;
color:white;
z-index:5;
}
</style>
</head>

<body>

<div id="intro">
  <div class="introBox">
    <h1>HearMeSKY</h1>
    <button class="startBtn" onclick="start()">START</button>
    <button class="appBtn">APP 가입</button>
  </div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="count"></div>

<script>

// ================= PARAM =================
const p = new URLSearchParams(location.search);
const text = (p.get("msg")||"WE LOVE GINA").replaceAll("_"," ");
const txtStyle = p.get("txtsty")||"standard";
const effStyle = p.get("effsty")||"none";

const video = document.getElementById("video");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
}
resize();
onresize=resize;

function textY(){ return canvas.height*0.42; }

// ================= STANDARD =================
function drawStandard(){
 ctx.fillStyle="#fff";
 ctx.font="bold 60px Arial";
 ctx.textAlign="center";
 ctx.fillText(text,canvas.width/2,textY());
}

// ================= DRONE =================
let drone=[];

function initDrone(){
 drone=[];
 const off=document.createElement("canvas");
 const o=off.getContext("2d");

 off.width=canvas.width;
 off.height=canvas.height;

 o.fillStyle="#fff";
 o.font="bold 110px Arial";
 o.textAlign="center";
 o.fillText(text,canvas.width/2,textY());

 const img=o.getImageData(0,0,off.width,off.height);

 for(let y=0;y<off.height;y+=7){
  for(let x=0;x<off.width;x+=7){
    let i=(y*off.width+x)*4;
    if(img.data[i+3]>128){
      drone.push({x,y});
    }
  }
 }
}

function drawDrone(){
 ctx.fillStyle="#fff";
 ctx.shadowBlur=10;
 ctx.shadowColor="#fff";

 drone.forEach(p=>{
   ctx.fillRect(p.x,p.y,2,2);
 });

 ctx.shadowBlur=0;
}

// ================= CLOUD =================
let cloud=[];

function initCloud(){
 cloud=[];
 const off=document.createElement("canvas");
 const o=off.getContext("2d");

 off.width=canvas.width;
 off.height=canvas.height;

 o.fillStyle="#fff";
 o.font="bold 110px Arial";
 o.textAlign="center";
 o.fillText(text,canvas.width/2,textY());

 const img=o.getImageData(0,0,off.width,off.height);

 for(let y=0;y<off.height;y+=7){
  for(let x=0;x<off.width;x+=7){
    let i=(y*off.width+x)*4;
    if(img.data[i+3]>128){
      cloud.push({
        x,y,
        r:5+Math.random()*5
      });
    }
  }
 }
}

function drawCloud(){
 cloud.forEach(p=>{
   let g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
   g.addColorStop(0,"rgba(255,255,255,0.9)");
   g.addColorStop(1,"rgba(255,255,255,0)");
   ctx.fillStyle=g;
   ctx.beginPath();
   ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
   ctx.fill();
 });
}

// ================= FIREWORK (최적화) =================
let fireworks=[];

function launchFirework(){
 let x=Math.random()*canvas.width;
 let targetY=canvas.height*0.3;

 fireworks.push({
   type:"rocket",
   x,
   y:canvas.height,
   vy:-6
 });
}

setInterval(()=>{
 if(effStyle==="fireworks" && fireworks.length<120){
   launchFirework();
 }
},1000);

function explodeFirework(x,y){

 const colors=[
   "#ff4040","#ffd700","#66ccff","#cc66ff","#ffffff"
 ];

 const color=colors[Math.floor(Math.random()*colors.length)];

 const arms=10;

 for(let i=0;i<arms;i++){
   let base=(Math.PI*2/arms)*i;

   for(let j=0;j<3;j++){
     let angle=base+(Math.random()-0.5)*0.2;
     let speed=1.5+Math.random()*2;

     fireworks.push({
       type:"spark",
       x,y,
       vx:Math.cos(angle)*speed,
       vy:Math.sin(angle)*speed,
       life:40,
       maxLife:40,
       color
     });
   }
 }
}

function drawFireworks(){

 let next=[];

 fireworks.forEach(p=>{

   if(p.type==="rocket"){

     p.y+=p.vy;

     ctx.fillStyle="#fff";
     ctx.fillRect(p.x,p.y,2,6);

     if(p.y<canvas.height*0.3){
       explodeFirework(p.x,p.y);
     }else{
       next.push(p);
     }

   }else{

     p.x+=p.vx;
     p.y+=p.vy;
     p.vy+=0.03;
     p.life--;

     ctx.globalAlpha=p.life/p.maxLife;
     ctx.strokeStyle=p.color;
     ctx.beginPath();
     ctx.moveTo(p.x,p.y);
     ctx.lineTo(p.x-p.vx*2,p.y-p.vy*2);
     ctx.stroke();

     if(p.life>0) next.push(p);
   }

 });

 fireworks=next;
 ctx.globalAlpha=1;
}

// ================= AURORA =================
let t=0;

function drawAurora(){

 t+=0.01;

 let h=canvas.height*0.3;

 ctx.globalAlpha=0.3;

 for(let i=0;i<3;i++){

   ctx.beginPath();

   for(let x=0;x<canvas.width;x+=5){
     let y=Math.sin(x*0.01+t+i)*20 + h*(0.4+i*0.2);
     ctx.lineTo(x,y);
   }

   ctx.lineTo(canvas.width,0);
   ctx.lineTo(0,0);
   ctx.closePath();

   let g=ctx.createLinearGradient(0,0,0,h);
   g.addColorStop(0,"rgba(0,255,200,0.4)");
   g.addColorStop(0.5,"rgba(180,0,255,0.3)");
   g.addColorStop(1,"transparent");

   ctx.fillStyle=g;
   ctx.fill();
 }

 ctx.globalAlpha=1;
}

// ================= START =================
async function start(){

 let s=await navigator.mediaDevices.getUserMedia({video:true});
 video.srcObject=s;
 await video.play();

 intro.style.display="none";

 if(txtStyle==="drone") initDrone();
 if(txtStyle==="cloud") initCloud();

 draw();
}

// ================= DRAW =================
function draw(){

 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(effStyle==="fireworks") drawFireworks();
 else if(effStyle==="aurora") drawAurora();

 if(txtStyle==="drone") drawDrone();
 else if(txtStyle==="cloud") drawCloud();
 else drawStandard();

 requestAnimationFrame(draw);
}

</script>
</body>
</html>
