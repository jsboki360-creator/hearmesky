<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin:0;
  padding:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
}

/* 카메라 */
video {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

/* 캔버스 */
canvas {
  position:fixed;
  width:100%;
  height:100%;
  z-index:1;
}

/* 인트로 */
#intro {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  z-index:50;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.introBox {
  text-align:center;
}

.introBox h1 {
  font-size:42px;
  margin-bottom:10px;
}

.introBox button {
  display:block;
  margin:12px auto;
  padding:15px 30px;
  font-size:18px;
  border:none;
  border-radius:30px;
  width:220px;
}

/* START */
.startBtn {
  background:red;
  color:white;
}

/* APP */
.appBtn {
  background:white;
  color:black;
}

/* 카운트 */
#countdownText {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:120px;
  color:white;
  z-index:30;
}
</style>
</head>

<body>

<div id="intro">
  <div class="introBox">
    <h1>HearMeSKY</h1>

    <button class="startBtn" onclick="enter()">START</button>

    <!-- 🔥 APP 가입 -->
    <button class="appBtn" onclick="goApp()">APP 가입</button>

  </div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="countdownText"></div>

<script>

// =======================
// 🔥 파라미터
// =======================
const params = new URLSearchParams(location.search);

let text = params.get("msg") || "HELLO";
let txtStyle = params.get("txtsty") || "drone";
let effStyle = params.get("effsty") || "none";

text = text.replaceAll("_"," ");

if(text.length > 60){
  text = text.substring(0,60) + "...";
}

// =======================
let particles = [];
let effects = [];
let started = false;

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
onresize = resize;

// =======================
// 📱 앱 이동
// =======================
function goApp(){

    const ua = navigator.userAgent.toLowerCase();

    if(ua.includes("iphone") || ua.includes("ipad")){
        window.location.href = "https://apps.apple.com/";
    }else{
        window.location.href =
        "https://play.google.com/store/apps/details?id=com.example.hearmesky";
    }
}

// =======================
// 📷 카메라
// =======================
async function requestCamera(){
    try{
        const stream = await navigator.mediaDevices.getUserMedia({
            video:{facingMode:"environment"}
        });
        video.srcObject = stream;
        return true;
    }catch{
        alert("카메라 필요");
        return false;
    }
}

// =======================
// 시작
// =======================
async function enter(){

    const ok = await requestCamera();
    if(!ok) return;

    intro.style.display = "none";

    await runCountdown();

    startShow();
}

// =======================
// 카운트다운
// =======================
function runCountdown(){
    return new Promise(res=>{
        const el = document.getElementById("countdownText");
        let c = 3;
        el.innerText = c;

        const t = setInterval(()=>{
            c--;

            if(c>0){
                el.innerText = c;
            }else{
                el.innerText = "";
                clearInterval(t);
                res();
            }
        },1000);
    });
}

// =======================
// 줄바꿈
// =======================
function drawMultiline(ctx, text, x, y, maxWidth, lineHeight){

    const words = text.split(" ");
    let line="";
    let lines=[];

    for(let i=0;i<words.length;i++){
        let test=line+words[i]+" ";
        if(ctx.measureText(test).width > maxWidth){
            lines.push(line);
            line=words[i]+" ";
        }else{
            line=test;
        }
    }
    lines.push(line);

    lines = lines.slice(0,3);

    let startY = y - (lines.length * lineHeight)/2;

    lines.forEach((l,i)=>{
        ctx.fillText(l.trim(), x, startY + i*lineHeight);
    });
}

// =======================
// 텍스트 스타일
// =======================
function initText(txt){

    if(txtStyle === "none"){
        particles = [];
        return;
    }

    if(txtStyle === "cloud"){
        initCloud();
    }else{
        initDrone(txt);
    }
}

// ▶ 드론
function initDrone(txt){

    const off = document.createElement("canvas");
    const o = off.getContext("2d");

    off.width = canvas.width;
    off.height = canvas.height;

    let size = Math.min(canvas.width/8, canvas.height/5);

    o.fillStyle="white";
    o.font=`bold ${size}px Arial`;
    o.textAlign="center";
    o.textBaseline="middle";

    drawMultiline(o, txt, canvas.width/2, canvas.height/2, canvas.width*0.8, size*1.3);

    const img = o.getImageData(0,0,off.width,off.height);

    particles=[];

    for(let y=0;y<off.height;y+=6){
        for(let x=0;x<off.width;x+=6){

            let i=(y*off.width+x)*4;

            if(img.data[i+3]>128){
                particles.push({
                    x:Math.random()*canvas.width,
                    y:Math.random()*canvas.height,
                    tx:x,
                    ty:y
                });
            }
        }
    }
}

// ▶ 구름
function initCloud(){
    particles=[];
    for(let i=0;i<800;i++){
        particles.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height,
            size:Math.random()*3+1
        });
    }
}

// =======================
// 🌌 이펙트
// =======================
function initEffect(){

    if(effStyle==="fireworks"){
        for(let i=0;i<200;i++){
            effects.push({
                x:canvas.width/2,
                y:canvas.height/2,
                vx:(Math.random()-0.5)*6,
                vy:(Math.random()-0.5)*6
            });
        }
    }

    if(effStyle==="milkyway"){
        for(let i=0;i<500;i++){
            effects.push({
                x:Math.random()*canvas.width,
                y:Math.random()*canvas.height
            });
        }
    }

    if(effStyle==="aurora"){
        for(let i=0;i<300;i++){
            effects.push({
                x:Math.random()*canvas.width,
                y:Math.random()*canvas.height/2,
                offset:Math.random()*1000
            });
        }
    }
}

// =======================
// 시작
// =======================
function startShow(){
    initText(text);
    initEffect();
    started=true;
    draw();
}

// =======================
// 애니메이션
// =======================
function draw(){

    if(!started) return;

    ctx.fillStyle="rgba(0,0,0,0.2)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="white";

    // 텍스트
    if(txtStyle !== "none"){
        particles.forEach(p=>{
            if(p.tx){
                p.x += (p.tx - p.x)*0.05;
                p.y += (p.ty - p.y)*0.05;
                ctx.fillRect(p.x,p.y,2,2);
            }else{
                ctx.beginPath();
                ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
                ctx.fill();
            }
        });
    }

    // 효과
    effects.forEach(e=>{

        if(effStyle==="fireworks"){
            e.x+=e.vx;
            e.y+=e.vy;
        }

        if(effStyle==="aurora"){
            e.y += Math.sin(Date.now()/500 + e.offset)*0.5;
        }

        ctx.fillRect(e.x,e.y,2,2);
    });

    requestAnimationFrame(draw);
}

</script>

</body>
</html>
