<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:Arial;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
filter:brightness(0.6);
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

#intro{
position:fixed;
width:100%;
height:100%;
background:black;
z-index:10;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.introBox{text-align:center;}

button{
display:block;
margin:12px auto;
padding:15px 30px;
border-radius:30px;
border:none;
font-size:18px;
width:220px;
}

.startBtn{background:red;color:white;}
.appBtn{background:white;color:black;}

#count{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:100px;
color:white;
z-index:5;
}

/* 캡쳐 버튼 */
#captureBtn{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
z-index:20;
padding:14px 28px;
border:none;
border-radius:30px;
font-size:18px;
background:#ffffff;
color:black;
box-shadow:0 0 15px rgba(255,255,255,0.6);
}

/* 공유 버튼 */
#shareBtn{
position:fixed;
bottom:90px;
left:50%;
transform:translateX(-50%);
z-index:20;
padding:14px 28px;
border:none;
border-radius:30px;
font-size:18px;
background:#00c853;
color:white;
box-shadow:0 0 15px rgba(0,255,100,0.6);
display:none;
}
</style>
</head>

<body>

<div id="intro">
  <div class="introBox">
    <h1>HearMeSKY</h1>
    <button class="startBtn" onclick="start()">START</button>
    <button class="appBtn" onclick="goApp()">APP 가입</button>
  </div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="count"></div>

<button id="captureBtn" onclick="capture()">📸 CAPTURE</button>
<button id="shareBtn" onclick="shareImage()">📤 SHARE</button>

<script>

// ================= PARAM =================
const params = new URLSearchParams(location.search);
const text = (params.get("msg") || "WE LOVE YOU").replaceAll("_"," ");
const effStyle = params.get("effsty") || "fireworks";

// ================= SETUP =================
const video = document.getElementById("video");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
}
resize();
onresize=resize;

let streamRef;

// ================= TEXT =================
function drawText(){
 ctx.fillStyle="#ffffff";
 ctx.font="bold 48px Arial";
 ctx.textAlign="center";
 ctx.textBaseline="middle";

 ctx.fillText(text, canvas.width/2, canvas.height*0.32);
}

// ================= FIREWORK =================
let rockets=[], sparks=[];

function launchRocket(){
 rockets.push({
  x:Math.random()*canvas.width,
  y:canvas.height,
  vx:(Math.random()-0.5),
  vy:-(Math.random()*4+6),
  exploded:false
 });
}
setInterval(launchRocket,1000);

function explode(x,y){
 const colors=["#ff3b3b","#ff6b6b","#ff2e63","#ff8c42","#ffd166"];
 let c=colors[Math.floor(Math.random()*colors.length)];

 for(let i=0;i<80;i++){
   let a=Math.random()*Math.PI*2;
   let s=Math.random()*2+1;

   sparks.push({
     x,y,
     vx:Math.cos(a)*s,
     vy:Math.sin(a)*s,
     life:70,
     size:Math.random()*1.2+0.6,
     color:c
   });
 }
}

function drawFireworks(){

 rockets.forEach(r=>{
   r.x+=r.vx;
   r.y+=r.vy;
   r.vy+=0.08;

   ctx.fillStyle="#fff";
   ctx.fillRect(r.x,r.y,2,6);

   if(r.vy>0 && !r.exploded){
     explode(r.x,r.y);
     r.exploded=true;
   }
 });

 sparks.forEach((s,i)=>{

   ctx.shadowBlur=0;

   s.x+=s.vx;
   s.y+=s.vy;
   s.vy+=0.03;
   s.life--;

   ctx.globalAlpha=s.life/70;

   ctx.strokeStyle=s.color;
   ctx.lineWidth=s.size;

   ctx.beginPath();
   ctx.moveTo(s.x,s.y);
   ctx.lineTo(s.x - s.vx*2.5, s.y - s.vy*2.5);
   ctx.stroke();

   ctx.globalAlpha=1;

   if(s.life<=0) sparks.splice(i,1);
 });
}

// ================= CAPTURE =================
let capturedBlob=null;

function capture(){

 const temp=document.createElement("canvas");
 temp.width=canvas.width;
 temp.height=canvas.height;
 const tctx=temp.getContext("2d");

 tctx.drawImage(video,0,0,temp.width,temp.height);
 tctx.drawImage(canvas,0,0);

 temp.toBlob(blob=>{
   capturedBlob=blob;
   document.getElementById("shareBtn").style.display="block";
 }, "image/png");
}

// ================= SHARE =================
async function shareImage(){

 if(!capturedBlob){
   alert("먼저 캡쳐하세요!");
   return;
 }

 const file=new File([capturedBlob],"hearmesky.png",{type:"image/png"});

 if(navigator.canShare && navigator.canShare({files:[file]})){
   await navigator.share({
     files:[file],
     title:"HearMeSKY",
     text:"메시지를 확인해보세요!"
   });
 }else{
   const link=document.createElement("a");
   link.href=URL.createObjectURL(capturedBlob);
   link.download="hearmesky.png";
   link.click();
 }
}

// ================= START =================
async function start(){

 streamRef=await navigator.mediaDevices.getUserMedia({
   video:{facingMode:"environment"}
 });

 video.srcObject=streamRef;
 await video.play();

 intro.style.display="none";

 await countdown();
 draw();
}

function countdown(){
 return new Promise(res=>{
  let c=3;
  count.innerText=c;
  let t=setInterval(()=>{
   c--;
   if(c>0) count.innerText=c;
   else{count.innerText="";clearInterval(t);res();}
  },1000);
 });
}

// ================= DRAW =================
function draw(){

 ctx.globalCompositeOperation="destination-out";
 ctx.fillStyle="rgba(0,0,0,0.08)";
 ctx.fillRect(0,0,canvas.width,canvas.height);
 ctx.globalCompositeOperation="source-over";

 if(effStyle==="fireworks") drawFireworks();

 drawText();

 requestAnimationFrame(draw);
}

// ================= APP =================
function goApp(){
 location.href="https://play.google.com/store/apps/details?id=com.example.hearmesky";
}

</script>
</body>
</html>
