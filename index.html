<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:Arial;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
filter:brightness(0.5);
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

#intro{
position:fixed;
width:100%;
height:100%;
background:black;
z-index:10;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

button{
padding:15px 30px;
border-radius:30px;
border:none;
font-size:18px;
}

.startBtn{background:red;color:white;}
</style>
</head>

<body>

<div id="intro">
  <button class="startBtn" onclick="start()">START</button>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="c"></canvas>

<script>

// ================= PARAM =================
const p = new URLSearchParams(location.search);
const text = (p.get("msg")||"WE LOVE GINA").replaceAll("_"," ");
const txtStyle = p.get("txtsty")||"standard";
const effStyle = p.get("effsty")||"none";

// ================= SETUP =================
const video = document.getElementById("video");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
}
resize();
onresize=resize;

function textY(){ return canvas.height*0.35; }

// ================= TEXT =================
function drawStandard(){
 ctx.fillStyle="#fff";
 ctx.font="bold 48px Arial";
 ctx.textAlign="center";
 ctx.fillText(text,canvas.width/2,textY());
}

// ================= DRONE =================
let drone=[];

function initDrone(){
 drone=[];
 const off=document.createElement("canvas");
 const o=off.getContext("2d");
 off.width=canvas.width;
 off.height=canvas.height;

 o.fillStyle="#fff";
 o.font="bold 80px Arial";
 o.textAlign="center";
 o.fillText(text,canvas.width/2,textY());

 const img=o.getImageData(0,0,off.width,off.height);

 for(let y=0;y<off.height;y+=10){
  for(let x=0;x<off.width;x+=10){
    let i=(y*off.width+x)*4;
    if(img.data[i+3]>128){
      drone.push({x,y});
    }
  }
 }
}

function drawDrone(){
 ctx.fillStyle="#fff";
 drone.forEach(p=>{
   ctx.beginPath();
   ctx.arc(p.x,p.y,2.2,0,Math.PI*2);
   ctx.fill();
 });
}

// ================= CLOUD =================
let cloud=[];

function initCloud(){
 cloud=[];
 const off=document.createElement("canvas");
 const o=off.getContext("2d");
 off.width=canvas.width;
 off.height=canvas.height;

 o.fillStyle="#fff";
 o.font="bold 80px Arial";
 o.textAlign="center";
 o.fillText(text,canvas.width/2,textY());

 const img=o.getImageData(0,0,off.width,off.height);

 for(let y=0;y<off.height;y+=12){
  for(let x=0;x<off.width;x+=12){
    let i=(y*off.width+x)*4;
    if(img.data[i+3]>128){
      cloud.push({x,y,r:6+Math.random()*3});
    }
  }
 }
}

function drawCloud(){
 ctx.fillStyle="rgba(255,255,255,0.8)";
 cloud.forEach(p=>{
   ctx.beginPath();
   ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
   ctx.fill();
 });
}

// ================= FIREWORK =================
let sparks=[];

function explode(){
 let x=Math.random()*canvas.width;
 let y=Math.random()*canvas.height*0.5;

 for(let i=0;i<40;i++){
   let a=Math.random()*Math.PI*2;
   let s=Math.random()*2+1;
   sparks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:60});
 }
}

setInterval(explode,1200);

function drawFireworks(){

 sparks.forEach((s,i)=>{
   s.x+=s.vx;
   s.y+=s.vy;
   s.life--;

   ctx.globalAlpha=s.life/60;
   ctx.strokeStyle="#ff4444";
   ctx.lineWidth=2;

   ctx.beginPath();
   ctx.moveTo(s.x,s.y);
   ctx.lineTo(s.x-s.vx*2,s.y-s.vy*2);
   ctx.stroke();

   ctx.globalAlpha=1;

   if(s.life<=0) sparks.splice(i,1);
 });
}

// ================= AURORA =================
let t=0;

function drawAurora(){
 t+=0.02;

 ctx.globalAlpha=0.12;

 for(let i=0;i<6;i++){
   let x=i*canvas.width/6+40;

   let g=ctx.createLinearGradient(x,0,x,canvas.height*0.4);
   g.addColorStop(0,"rgba(255,0,150,0.3)");
   g.addColorStop(0.5,"rgba(0,200,255,0.2)");
   g.addColorStop(1,"transparent");

   ctx.fillStyle=g;

   ctx.beginPath();

   for(let y=0;y<canvas.height*0.4;y+=5){
     let w=Math.sin(y*0.01+t+i)*25;
     ctx.lineTo(x+w,y);
   }

   ctx.lineTo(x+80,canvas.height*0.4);
   ctx.lineTo(x+80,0);
   ctx.closePath();
   ctx.fill();
 }

 ctx.globalAlpha=1;
}

// ================= START =================
async function start(){

 let s=await navigator.mediaDevices.getUserMedia({video:true});
 video.srcObject=s;
 await video.play();

 intro.style.display="none";

 if(txtStyle==="drone") initDrone();
 if(txtStyle==="cloud") initCloud();

 draw();
}

// ================= DRAW =================
function draw(){

 ctx.clearRect(0,0,canvas.width,canvas.height);

 // 효과 먼저
 if(effStyle==="fireworks") drawFireworks();
 else if(effStyle==="aurora") drawAurora();

 // 텍스트
 if(txtStyle==="drone") drawDrone();
 else if(txtStyle==="cloud") drawCloud();
 else drawStandard();

 requestAnimationFrame(draw);
}

</script>
</body>
</html>
